    - cp-oplog: append/segment/replay/compact/service inline + crash_replay integration (M0 V1/V2)
    - cp-mod-bridge: boot/heartbeat/tee/intake/body inline

    ### Phase 21 (X788) DONE: cp-wire test suite
    Two integration files in crates/cp-wire/tests/: framing_integrity.rs (8 tests, byte-granular torn-tail/corruption sweep) + protocol.rs (7 tests, every OpEntryKind round-trip incl Checkpoint{Snapshot}, accepts() N-1 sweep, ContentHash from_hex bijection, SeenSet evict barrier, Heads upsert). Committed + pushed.

    ### CRITICAL lint gotchas (carry forward to phases 22-30)
    - Each tests/ file is a SEPARATE crate target. per-target `unused-crate-dependencies` (forbid) flags every cp-wire/crate dep the test file does NOT directly name. FIX: add `use <crate> as _;` block at top for the unnamed deps. CB3 rust-check is LIB-ONLY (no --all-targets) — does NOT catch this. ALWAYS `cargo test -p <crate>` before commit.
    - Test-target rustc lints that fire under cargo test but NOT CB3: let-underscore-drop (bind `let _named =` for Result-with-destructor), unused-results (bind discarded usize/insert returns), unused-crate-dependencies.
    - Lint-safe test patterns: avoid `as u8` (cast_possible_truncation deny) → u8::try_from(x & 0xFF).unwrap_or(0); avoid to_le_bytes (little_endian_bytes forbid) → [0xFF;4] copy_from_slice for corrupt u32::MAX prefix. expect()/panic!/assert_eq with f64-containing struct (derived PartialEq, not my ==) all allowed in test context.

    ### Remaining: phases 22-30 (X789-X797) per-component exhaustive suites, then capstone Phase 20 (X787) M4 = full V1-V12 fault gate + observability + soak + sign-off.
    - 22 (X789): cp-oplog append/segment/replay (rev monotonic, segment naming/parse, roll-at-limit, leading-checkpoint, torn-tail recovery, replay_fast==replay_full equivalence over many shapes).
    - 23 (X790): cp-oplog dedup/compaction (V3 long-gap no-op, ack-rev-only eviction, mark idempotent, compaction deletes pre-checkpoint segs + replay identical, body_gc_eligible 60s boundary).
    - 24 (X791): cp-oplog service group-commit (Durability::of exhaustive, append_durable blocks under full queue, append_best_effort drops, commit_loop one-fdatasync-per-group, sync-failure overrides, Drop+shutdown join+sync, concurrent submitters rev-monotonic).
    - 25 (X792): bridge boot/heartbeat (flock second-boot-refuses, atomic 0600 record, identity entropy, Drop cleanup, Beacon first-beat-sync/in-place/cadence/verdict matrix).
    - 26 (X793): bridge tee/intake/body (producer-never-blocks 100k<5s, O(1)drop+degraded, intake bad-bearer-reject/journal-then-ack/dedup-across-deadman/fail-closed, body inline-vs-spill I13/get-integrity/gc-grace V12).
    - 27 (X794): backend registry/channel (scan-and-diff event matrix, Stale only on Live→non-live, reap_tmp, liveness three-factor matrix, Tailer gap-free/idempotent/segment-roll/seed, hydrate verified/missing/corrupt, send framed-ack/refused-retry).
    - 28 (X795): backend supervisor (allow-list realpath gate symlink/.., duplicate-id, SIGTERM→grace→SIGKILL, reap-no-zombie, restart new-pid, adopt+vanish signal-0, check_liveness reap).

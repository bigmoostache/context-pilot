  contents: |-
    ## Counter Logic
    - Think called: counter = max(1, counter+1)
    - Any other tool: counter = min(0, counter-1)

    ## Notification System
    - Fires at next_notification_at, advances by reminder_threshold each time
    - Resets next_notification_at to reminder_threshold when Think is called
    - Message: "Please think more. Thinking is both cheap in tokens, and drastically augments your performances."
    - No % operator (banned by clippy) — uses marker tracking instead

    ## Queue Bypass
    - Think bypasses queue intercept in pipeline.rs (tool.name != "Think" check)

    ## UI
    - Status bar card: ThinkCard (red bg) shows negative balance, hidden when >= 0
    - Config overlay (Ctrl+H): Think nudge threshold with [ ] keys, default -5, capped at -1 min
    - Config overlay trimmed: removed theme picker, API check section, reduced separators to 1 line

    ## State
    - pub(crate) ThinkState re-exported from questions/mod.rs
    - Stored via ext/ext_mut on State, serialized via save/load_worker_data
    - Actions: ConfigThinkThresholdUp/Down in actions.rs, events.rs ([ ] keys)

    ## Files Changed
    think.rs, questions/mod.rs, core.yaml, actions.rs, events.rs, actions/mod.rs, config_overlay.rs, frame.rs, status_bar.rs, render_status_bar.rs, pipeline.rs, infra/config.rs

  tl_dr: Orchestration backend, branch 'demaquetting', 30 phases X768-X797. Phases 1-30 DONE & green. Only capstone Phase 20 (X787, M4 ship gate) remains. Details in contents.
  contents: |-
    ## Orchestration backend — branch 'demaquetting' (30 phases X768-X797)

    ALL 30 implementation+testing phases DONE & green. Only X787 (Phase 20, M4 ship gate) remains.

    ### Trichotomy (each file's doc says which side)
    - cp-wire + cp-oplog = SHARED (I/O contract + WAL)
    - cp-mod-bridge = AGENT-only
    - cp-orchestrator = BACKEND-only

    ### Crate test counts (all green under full lint gate)
    - cp-wire: 74 (59 lib + 8 framing_integrity + 7 protocol)
    - cp-oplog: 56
    - cp-mod-bridge: 48
    - cp-orchestrator: 95 (76 lib + 4 registry_channel + 4 services_integration + 4 supervisor_lifecycle + 4 transport_http + 3 end_to_end)

    ### Phase 30 (X797) DONE: transport + e2e
    - tests/common/mod.rs: hand-rolled blocking HTTP/1.1 + SSE client over TcpStream (request/get/post_json/sse_collect, SseEvent{id,event,data}). NOT a test binary (tests/ submodule).
    - tests/transport_http.rs (4): REST rev-envelope+404; ticket mint + command 400/503-tripped; SSE ticket-gate 401 single-use; Last-Event-ID replay rev>2.
    - tests/end_to_end.rs (3): capstone loop (agent OplogService+Intake+UnixListener accept ↔ backend transport: POST /command→UDS→journal-then-ack→receipt rev:0→Tailer tails same oplog→SSE delta id=rev + carries dedup token); body hydrate over REST 200/400/404; 25-cycle SSE soak + server-still-healthy.

    ### Phase 30 BUG fixed (production transport): SSE over tiny_http 0.12 sent 0 bytes
    - Root cause: respond() does io::copy(reader→chunked Encoder→BufWriter::with_capacity(1024)) and flushes ONLY after raw_print returns — never, for an unbounded SSE stream — so small events (<1KB) sit unflushed forever.
    - FIX: handle_stream now uses request.into_writer() (raw Box<dyn Write>), writes the HTTP preamble + SSE headers manually, pumps SseBody and flush()es after every event (stream_to_client fn). Error paths (401/404/400) via respond_json still fine (finite). Removed sse_headers() + its test + StatusCode import.

    ### CRITICAL lint gotchas
    - Each tests/ file is a SEPARATE crate target. per-target unused-crate-dependencies (forbid) flags every linked dep not directly named → `use <crate> as _;` block at top. cp-orchestrator unnamed-in-tests: cp_mod_bridge, nix, serde, serde_json, tiny_http (varies per file).
    - dead_code is PER-BINARY: a common/mod.rs field read in one test binary but not another flags dead in the latter (SseEvent.id: end_to_end had to assert delta.id to read it).
    - CB3 rust-check is LIB-ONLY — ALWAYS `cargo test -p <crate>` before commit.
    - M62: real connect/accept UDS propagate EOF reliably; socketpair shutdown(Write) does NOT.

    ### Remaining: capstone Phase 20 (X787)
    - M4 ship gate = full V1-V12 fault matrix in CI + security audit + observability (p50/p99 latency, dropped/coalesced frames, rev lag, fsync latency, watch count, durable breaker state; logs keyed agent_id+cmd_id+rev) + multi-agent soak (flat mem/FD/threads) + flip every §20 register row designed→validated. This is the LAST phase.

    ### cp-orchestrator lib API surface
    - services::{MaterializedView/AgentView/CostSnapshot, CostBreaker/Verdict, StreamHub/Subscriber}.
    - channel::Tailer::new(PathBuf)/seed(rev)/poll()->io::Result<Vec<OpEntry>>/last_rev. AgentChannel::from_entry/hydrate/send/send_with_retry.
    - transport::{Backend::new(agents_dir,budget), serve, serve_bound, ticket::TicketStore, rest, sse} on tiny_http.
    - AgentSupervisor: new/len/is_empty/spawn/stop/restart/adopt/check_liveness + Error + Event{Exited,Vanished}.

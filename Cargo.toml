[workspace]
members = [".", "crates/cp-base", "crates/cp-console-server", "crates/cp-mod-callback", "crates/cp-mod-console", "crates/cp-mod-files", "crates/cp-mod-git", "crates/cp-mod-github", "crates/cp-mod-logs", "crates/cp-mod-memory", "crates/cp-mod-queue", "crates/cp-mod-scratchpad", "crates/cp-mod-spine", "crates/cp-mod-todo", "crates/cp-mod-tree", "crates/cp-mod-prompt", "crates/cp-mod-preset", "crates/cp-mod-typst", "crates/cp-mod-brave", "crates/cp-mod-firecrawl"]

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
description = "Context Pilot — AI coding assistant TUI"
repository = "https://github.com/gdraznieks/context-pilot"
keywords = ["ai", "tui", "coding-assistant"]
categories = ["command-line-utilities", "development-tools"]
readme = "README.md"

[workspace.dependencies]
cp-base = { path = "crates/cp-base" }
ratatui = "0.30"
crossterm = "0.29"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
sha2 = "0.10"
chrono = "0.4"
regex = "1.10"
ignore = "0.4"
globset = "0.4"
unicode-width = "0.2"
reqwest = { version = "0.12", features = ["blocking", "json"] }

[workspace.lints.rust]
ambiguous_associated_items = "forbid"
ambiguous_glob_imports = "forbid"
arithmetic_overflow = "forbid"
binary_asm_labels = "forbid"
bindings_with_variant_name = "forbid"
conflicting_repr_hints = "forbid"
dangerous_implicit_autorefs = "forbid"
dependency_on_unit_never_type_fallback = "forbid"
deref_nullptr = "forbid"
elided_lifetimes_in_associated_constant = "forbid"
enum_intrinsics_non_enums = "forbid"
explicit_builtin_cfgs_in_flags = "forbid"
ill_formed_attribute_input = "forbid"
incomplete_include = "forbid"
ineffective_unstable_trait_impl = "forbid"
invalid_atomic_ordering = "forbid"
invalid_doc_attributes = "forbid"
invalid_from_utf8_unchecked = "forbid"
invalid_macro_export_arguments = "forbid"
invalid_null_arguments = "forbid"
invalid_reference_casting = "forbid"
invalid_type_param_default = "forbid"
legacy_derive_helpers = "forbid"
let_underscore_lock = "forbid"
long_running_const_eval = "forbid"
macro_expanded_macro_exports_accessed_by_absolute_paths = "forbid"
mutable_transmutes = "forbid"
named_asm_labels = "forbid"
never_type_fallback_flowing_into_unsafe = "forbid"
no_mangle_const_items = "forbid"
out_of_scope_macro_calls = "forbid"
overflowing_literals = "forbid"
patterns_in_fns_without_body = "forbid"
proc_macro_derive_resolution_fallback = "forbid"
pub_use_of_private_extern_crate = "forbid"
repr_transparent_non_zst_fields = "forbid"
semicolon_in_expressions_from_macros = "forbid"
soft_unstable = "forbid"
text_direction_codepoint_in_comment = "forbid"
text_direction_codepoint_in_literal = "forbid"
unconditional_panic = "forbid"
undropped_manually_drops = "forbid"
unknown_crate_types = "forbid"
useless_deprecated = "forbid"
# Visibility hygiene — flag pub items that don't need to be pub
unreachable_pub = "forbid"
# Missing Debug impls on public types (good for inspectability)

name: Build & Release

on:
  push:
    branches: ["master"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.95.0"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: cpilot-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: cpilot-linux-aarch64
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: cpilot-linux-aarch64-musl
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: cpilot-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: cpilot-macos-aarch64

    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ env.RUST_VERSION }}
        run: |
          rustup toolchain install ${{ env.RUST_VERSION }} --profile minimal
          rustup default ${{ env.RUST_VERSION }}
          rustup target add ${{ matrix.target }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: |
          cargo build --release --target ${{ matrix.target }}
          cargo build --release --target ${{ matrix.target }} -p cp-console-server

      - name: Build (cross)
        if: ${{ matrix.cross }}
        run: |
          cross build --release --target ${{ matrix.target }}
          cross build --release --target ${{ matrix.target }} -p cp-console-server

      - name: Package tarball
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/tui staging/cpilot
          cp target/${{ matrix.target }}/release/cp-console-server staging/cp-console-server
          chmod 755 staging/*
          tar -czf ${{ matrix.artifact }}.tar.gz -C staging .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          short_sha=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "name=v${version} (${short_sha})" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
          make_latest: true

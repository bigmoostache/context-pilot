---
# Enable + start the systemd services (after the seed) and verify they answer.
# The orchestrator starts first — it
# seeds the admin from seed.env and writes the Caddyfile — then Caddy serves it.

- name: Enable the systemd services
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
  loop:
    - context-pilot
    - caddy

- name: (Re)start the orchestrator
  ansible.builtin.systemd_service:
    name: context-pilot
    state: restarted

- name: Wait for the product API to answer
  ansible.builtin.uri:
    url: http://127.0.0.1:7878/api/health
    status_code: 200
  register: health
  retries: 15
  delay: 1
  until: health.status == 200

- name: (Re)start Caddy (now that the orchestrator wrote the Caddyfile)
  ansible.builtin.systemd_service:
    name: caddy
    state: restarted

# The orchestrator's own health was already verified on the loopback :7878
# above; there is no longer an always-on maintenance plane to probe. Caddy fronts
# the cockpit on :80 (day-0) or :443 (once the client names the box), so the
# public URL depends on provisioning state and is reported, not probed.
- name: Report readiness
  ansible.builtin.debug:
    msg: >-
      {{ inventory_hostname }} ready —
      day-0 setup at http://{{ ansible_host | default(inventory_hostname) }}:80
      (unprovisioned box; becomes https://<name> once the client names it).

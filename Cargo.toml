unknown_diagnostic_attributes = "forbid"
# Unknown lint names — always fix
unknown_lints = "forbid"
# Unstable syntax before expansion — always fix
unstable_syntax_pre_expansion = "forbid"
# Dead assignments — always remove
unused_assignments = "forbid"
# Dead imports — always remove
unused_imports = "forbid"
# Dead macros — always remove
unused_macros = "forbid"
# Unused variables — always remove

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.95.0"

permissions:
  contents: read

jobs:
  rust:
    name: Rust (fmt · clippy · build · test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ env.RUST_VERSION }}
        run: |
          rustup toolchain install ${{ env.RUST_VERSION }} --profile minimal --component rustfmt,clippy
          rustup default ${{ env.RUST_VERSION }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy lints
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test

  structure:
    name: Structure (lengths · folders · lints · web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check file lengths (max 500 lines)
        run: .github/checks/check-file-lengths.sh

      - name: Check folder sizes (max 8 entries)
        run: .github/checks/check-folder-sizes.sh

      - name: Check lint exception registry
        run: .github/checks/check-lint-exceptions.sh

      - name: Verify lint config hash chain
        run: .github/checks/check-lint-config.sh

      - name: Check web structure
        run: .github/checks/check-web-structure.sh

      - name: Check vault bypass
        run: .github/checks/check-vault-bypass.sh

      - name: Check frontend suppressions (P4 anti-cheat)
        run: .github/checks/check-frontend-suppressions.sh

  contract:
    name: Contract (OpenAPI · TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ env.RUST_VERSION }}
        run: |
          rustup toolchain install ${{ env.RUST_VERSION }} --profile minimal
          rustup default ${{ env.RUST_VERSION }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          # Pinned to the version that generates the committed pnpm-lock.yaml
          # (lockfileVersion 9.0) locally. pnpm 11 introduced the workspace-root
          # `packages:` requirement and the `allowBuilds` build-script
          # adjudication model that web/pnpm-workspace.yaml relies on; running an
          # older major here diverged the environment from the lockfile's origin.
          version: 11.6.0

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      - name: Check TypeScript contract
        run: .github/checks/check-typescript-contract.sh

  frontend:
    name: Frontend (eslint · tsc · prettier · stylelint · type-coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          # Match the lockfile origin (see the contract job + M144).
          version: 11.6.0

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      # The exhaustive project-wide mirror of the incremental web-lint callback
      # (which runs eslint + prettier on only the changed files at edit time).
      # Each tool is its own step so a failure is attributable.
      - name: ESLint (--max-warnings 0)
        run: npx eslint . --max-warnings 0
        working-directory: web

      - name: TypeScript (tsc -b)
        run: npx tsc -b
        working-directory: web

      - name: Prettier (--check)
        run: npx prettier --check .
        working-directory: web

      - name: Stylelint
        run: npx stylelint "src/**/*.css"
        working-directory: web

      - name: Type coverage
        run: npx type-coverage --project tsconfig.app.json
        working-directory: web

      # Ruleset drift guard (clippy_compare twin): the resolved eslint ruleset
      # for a representative app-source file must match the committed, hash-locked
      # baseline — catches a silent error→warn/off flip or a plugin-bump drop.
      # Runs here (not the structure job) because it needs web/node_modules.
      - name: Frontend rule census
        run: .github/checks/check-frontend-rule-census.sh

      # Cross-file dead code (the inter-crate dead_code twin): dead exports,
      # orphan files, unused deps — what tsc/eslint structurally can't see. The
      # CB "web-deadcode" blocking callback invokes this SAME script with the
      # SAME string, so CI and callback are structurally equal (one whole-graph
      # knip pass, one implementation, hash-locked). Needs web/node_modules.
      - name: Frontend dead code (knip)
        run: .github/checks/check-web-deadcode.sh

tools:
  Close_panel:
    description: |
      Closes context elements by their IDs (e.g., P6, P7). Cannot close core elements (P1-P6).
      WARNING: Closing a panel causes INSTANT, IRREVERSIBLE memory loss — the panel's content is immediately removed from your context and you will have NO memory of what it contained. This is NOT like "reading then closing" — the moment the panel closes, all information in it vanishes from your awareness. Therefore: ALWAYS finish all work that depends on a panel's content BEFORE closing it. The pattern "open → remember content → close → use remembered content" DOES NOT WORK. You must act on the information while the panel is still open.
    parameters:
      ids: "List of context IDs to close"

  system_reload:
    description: |
      Reloads the TUI application to apply changes. Use after modifying TUI source code and rebuilding. State is preserved. IMPORTANT: You must ALWAYS call this tool after building - never just say 'reloading' without actually invoking this tool.

  tool_manage:
    description: |
      Enables or disables tools. This tool cannot be disabled. Use to customize available capabilities.
    parameters:
      changes: "Array of tool changes"
      tool: "Tool ID to change (e.g., 'edit_file', 'glob')"
      action: "Action to perform"

  panel_goto_page:
    description: |
      Navigates to a specific page of a paginated panel. Only available when a panel has more than one page.

      DESTRUCTIVE: only the current page is ever in your context. Navigating away
      PERMANENTLY discards the current page's content — you retain NOTHING from it
      except the note you write in `current_page_description`. This is not like
      flipping through a document you can re-read; the bytes are gone from context
      and there is no trace they existed. Do NOT walk pages to "read" a panel:
      each hop re-emits a full page (~25k tokens), breaks the prompt cache, and
      loses what you just saw. Prefer searching the panel or opening a specific
      range. Only page when you have a concrete reason, and always extract what
      you need from the current page FIRST.

      Your `current_page_description` notes accumulate in a scratchpad at the top
      of the panel, so they survive after each page's raw content is discarded.
      The scratchpad is temporary — it vanishes when the panel is closed.
    parameters:
      panel_id: "Panel ID (e.g., P8)"
      page: "Page number (1-indexed) to navigate TO"
      current_page_description: "COMPULSORY. A concise but information-dense summary of what is on the page you are CURRENTLY viewing (the page you are about to leave). This is saved to the panel's scratchpad and is the ONLY thing you keep once you navigate away — its raw content is discarded. Capture the facts, names, values, and line ranges you'll need later."

  module_toggle:
    description: |
      Activates or deactivates modules. Core module cannot be deactivated. Deactivating a module removes its tools and panels. Cannot deactivate a module if another active module depends on it.
    parameters:
      changes: "Array of module changes"
      module: "Module ID (e.g., 'git', 'memory', 'tmux')"
      action: "Action to perform"

  Think:
    description: |
      Records a reasoning step or deliberation as a structured tool call. Use this when you need to think through a tricky problem before acting — weighing trade-offs, planning a multi-step approach, or working through a chain of logic that benefits from being made explicit.

      The full thought stays in your active context for the current turn. Once the conversation gets compacted into history (long-running sessions detach old turns into frozen panels), the thought body drops away. This lets you reason at length without permanently bloating the conversation log.

      WHEN TO USE:
      - Before committing to a non-trivial implementation plan, sketch the design out loud.
      - When facing ambiguity in user intent, lay out the interpretations and pick one.
      - When debugging, walk through your hypothesis chain explicitly.
      - When code paths fork on subtle conditions, reason through which branch fits.

      WHEN NOT TO USE:
      - Trivial decisions or single-step actions — just do them.
      - Reasoning that's already captured implicitly by the next tool call (e.g., opening a file you obviously need to read).
      - As filler. Every think call should earn its place.

      The thought body should be your real reasoning — uncensored, rigorous, structured.

      CONTEXT RADAR: Use the task_context parameter to describe what you're currently working on (1-2 sentences). This feeds the Context Radar panel, which automatically recalls related past decisions and context from logs. Describe *what* you're working on, not *how*. The panel refreshes whenever you provide a new task_context.
    parameters:
      thought_body: "The full reasoning. Be thorough — this is your scratch space to think clearly. Markdown is supported. Stays in active context until the turn is detached into history."
      task_context: "Short (1-2 sentences) description of what you're currently working on. Feeds the Context Radar panel — automatically recalls related past decisions and context from logs. Describe *what* you're working on, not *how*. Example: 'Investigating port reconnection failure on TUI reload'"

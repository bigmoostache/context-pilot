# Partial register use in inline asm — always fix
asm_sub_register = "forbid"
# async fn in trait without Send bounds — always be explicit
async_fn_in_trait = "forbid"
# AT&T vs Intel asm style — always fix
bad_asm_style = "forbid"
# Dead code — always remove
dead_code = "forbid"
# Leaking private deps through public API — always fix
exported_private_dependencies = "forbid"
# Using #[deny(lint_group)] — always spell out individual lints
forbidden_lint_groups = "forbid"
# Incomplete feature gates — always be explicit
incomplete_features = "forbid"
# #[inline] on #[no_sanitize] — always a bug
inline_no_sanitize = "forbid"
# Using internal rustc features — always wrong in user code

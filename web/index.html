<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Context Pilot — phosphor cockpit interface (design maquette)"
    />
    <title>Context·Pilot — Cockpit</title>
    <!-- Set the theme class before first paint to avoid a light→dark flash
         (FOUC). Mirrors the logic in src/lib/theme.tsx: honour the saved
         preference, otherwise fall back to the OS `prefers-color-scheme`. -->
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem("cp-theme")
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"
          }
          if (t === "dark") document.documentElement.classList.add("dark")
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

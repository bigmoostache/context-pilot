break_with_label_and_loop = "forbid"
# Two different signatures for same extern symbol — always a bug
clashing_extern_declarations = "forbid"
# Soundness-adjacent, always fix
coherence_leak_check = "forbid"
# Identifiers that look alike (latin/cyrillic) — always a bug or attack
confusable_idents = "forbid"
# Soundness issue, always fix
const_evaluatable_unchecked = "forbid"
# Duplicate of const_item_mutation, same reasoning
const_item_interior_mutations = "forbid"
# Mutating a const is always a bug (you get a copy each time)
const_item_mutation = "forbid"
# Always a bug — pointer to dropped local
dangling_pointers_from_locals = "forbid"
# Always a bug — pointer to dropped temporary
dangling_pointers_from_temporaries = "forbid"
# Using deprecated APIs should be fixed immediately
deprecated = "forbid"
# Always wrong syntax, easy fix
deprecated_where_clause_location = "forbid"
# Always confusing, always a mistake
double_negations = "forbid"
# T: Drop bound is always wrong (not all droppable types impl Drop)
drop_bounds = "forbid"
# drop() on a Copy type does nothing, always a bug
dropping_copy_types = "forbid"
# drop(&x) does nothing, always a bug
dropping_references = "forbid"
# Always a mistake
duplicate_macro_attributes = "forbid"
# dyn Drop is almost never what you want
dyn_drop = "forbid"
# Use ..= not ..., always wrong on modern Rust
ellipsis_inclusive_range_patterns = "forbid"
# for x in Some(v) is always a bug
for_loops_over_fallibles = "forbid"
# forget() on Copy type does nothing, always a bug

"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

# Copy gitignored API keys into each new workspace (DeepSeek, Firecrawl, Brave,
# GitHub, Voyage, Datalab). run.sh sources .env at launch.
file_include_globs = ".env"

[scripts]
# Warm the build so the first run.sh is fast. Prefer system OpenSSL over the
# vendored build (avoids the Perl dependency) — mirrors run.sh.
setup = "pkg-config --exists openssl 2>/dev/null && export OPENSSL_NO_VENDOR=1; cargo build"

# Dev loop: sources .env, builds TUI + console server, runs with reload supervisor.
# Console server uses a per-workspace Unix socket, not a TCP port — no CONDUCTOR_PORT.
run = "./run.sh"

# Stop the per-workspace console-server daemon so it doesn't orphan.
archive = "[ -f .context-pilot/console/server.pid ] && kill \"$(cat .context-pilot/console/server.pid)\" 2>/dev/null; true"

# Each workspace has its own .context-pilot state and socket — safe to run in parallel.
run_mode = "concurrent"

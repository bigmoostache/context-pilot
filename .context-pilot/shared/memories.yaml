    ## X887 — auto tool-activity → focused thread (SHIPPED on demaquetting)

    When AI focused on a thread, EVERY tool call appends a regular thread message {verb · tool — intent} marked auto:true, WITHOUT switching turn/focus. No focus = nothing. AI hides them from context; UI renders collapsed (consecutive runs).

    ### Implementation (8 subtasks X888–X895, all done)
    - **X888 schema**: cp-mod-threads/types.rs ThreadMessage.auto: bool (#[serde(default)]). 4 construction sites set auto:false (tools.rs execute_send, bridge.rs apply_send_message, input.rs handle_thread_input_submit, actions/threads.rs question_enter).
    - **X889 hook**: src/app/run/threads/mod.rs maybe_append_tool_activity(state,&ToolUse) — pub(in crate::app::run), focus-gated via FocusState.focused_thread_id; skips Send/Read; content '/* auto */ {verb} · {tool} — {intent}'; author=Assistant, acknowledged=true, auto=true; NO status/focus change, NO spine notif. Called from pipeline.rs save_tool_call_message + queue_flush.rs save_flushed_tool_call_message.
    - **X890 context-skip**: cp-mod-threads/tools.rs build_panel_content filters .filter(|m| !m.auto) (visible Vec, skip/total on non-auto count) so AI never re-reads its own action log.
    - **X891 emit**: run/threads/messages.rs build_pending JSON adds auto:msg.auto; sync.ts applyThreadDelta parses raw.auto; types.ts ThreadMsg.auto?; api.ts RawMsg.auto? + fetchThreads passes auto.
    - **X892 reshape**: thread_shape.rs reshape_message adds auto from raw.get('auto').as_bool().unwrap_or(false) — disk plane carries auto, positional msg_{index} ids stay aligned across planes.
    - **X893 web render**: ThreadConversation.tsx segmentLog() folds consecutive auto into runs, AutoRun (<details> '⚙ N tool actions'), autoLine() strips marker. ThreadList.tsx previewOf skips auto.
    - **X894 TUI render**: ui/threads_view/messages.rs renders auto msgs as a single dim '⚙ {line}' IR line (auto_line() strips marker) not a bubble.


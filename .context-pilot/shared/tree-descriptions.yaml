  description: 'SSE producer loop (run_stream), extracted from transport/mod.rs to stay under the line budget. Tails one agent''s oplog (rev-numbered durable deltas) + stream-hub frames, pushes both down the SSE sink until disconnect. T123 cold-connect fix: a fresh subscriber (no Last-Event-ID) seeds the Tailer at the oplog HEAD (oplog_head_rev) so it rides only the live tail instead of replaying the whole history; reconnect seeds at last-seen rev for gap replay. T271 off-by-one fix: oplog_head_rev now returns Option<u64> (was u64 via unwrap_or(0)); on an EMPTY log (rev_head None) the cold-connect path leaves the tailer UNSEEDED rather than seed(0), so the agent''s very first append (rev 0) rides the live tail instead of being silently dropped (seed is an exclusive lower bound). 2 regression unit tests: cold_connect_on_empty_oplog_delivers_first_append + cold_connect_on_nonempty_oplog_skips_backlog. TAIL_REPOLL=5ms backstop (macOS FSEvents), KEEPALIVE=10s.'
  last_edited_ms: 1781885263050
6c533887106d50ef:
  path: docs/design-orchestration-backend.md
  description: 'Orchestration backend design doc, v6 (branch maquette) — v5 code-grounded three-tier durability + v6 honesty pass (senior-dev review, thread T35). Tiers: ① bridge-owned append-only fsync''d OPLOG (authoritative: command effects, rev, seen-marks, phase, lifecycle, cost, + immutable content-addressed BODY STORE) + ② existing UNTOUCHED PersistenceWriter as mutable coalesced state cache (messages/{uid}.yaml) + ③ lossy UDS stream. v6''s three corrections: (1) §11.1+I2+V11 INERTNESS HONESTY — ''exactly as today'' holds only bridge-OFF; bridge-ON adds per-event oplog durability latency moved off the hot path (dedicated oplog thread + group commit) but non-zero, measured by V11. (2) I2+B7 FSYNC MODEL — fdatasync per commit-group + fsync(dir) only on segment creation (not fsync(file)+fsync(dir) per append). (3) §3.1+I3/I5+V12 BODY-STORE CONTRADICTION RESOLVED — v5 called bodies both mutable tier-② and immutable content-addressed (impossible); v6 splits into two physical stores (mutable writer-owned messages/{uid}.yaml vs bridge-owned immutable oplog body store; small inlined=zero double-write, large spilled to oplog/bodies/{hash}=named double-write). writer.rs untouched (bridge adds disjoint path). I1 restated = single-PROCESS flock exclusion, intra-process disjoint-path threads permitted. Open-Q1 LOCKED (framed+CRC, V1 depends on it). §20 register banner: ✅=''designed, test-pending'', §25 is real status. I1-I12, K1-K9, R2-*, V1-V12 fault matrix. Companions: architecture-adversarial-analysis.md, roadmap.md. NOT implemented (discussion).'
  last_edited_ms: 1781611000524

---
# Deploy Context Pilot onto an ALREADY-INSTALLED Armbian/Debian box (systemd),
# over the LAN. Debian counterpart of site.yml (which targets the factory
# OpenWrt/procd image).
#
# Differences vs site.yml:
#   - systemd units instead of procd init.d           (tasks/deploy-debian.yml, start-debian.yml)
#   - cp_root=/opt/context-pilot instead of /mnt/data (Debian rootfs is the whole disk)
#   - NO free-port-80 / open-client-firewall          (no LuCI/pcat-web on :80/:443, no uci wan REJECT)
# Reused as-is (path-agnostic via cp_root): fetch.yml, keys.yml, seed.yml + env templates.
#
# Usage (LAN, key auth):
#   ./.venv/bin/ansible-playbook -i <inventory> deploy/ansible/site-debian.yml \
#       -e release=latest -e cp_admin_email=you@example.com
#   # provider keys (optional): -e @deploy/ansible/<name>.local.yml  (cp_provider_keys dict)
#   # use the local build bundle instead of a GitHub release: -e release=local

- name: Deploy + provision Context Pilot on Armbian/Debian (systemd, LAN)
  hosts: all
  become: false            # we log in as root; minimal Armbian may lack sudo
  gather_facts: false
  vars:
    repo_root: "{{ playbook_dir | dirname | dirname }}"
    artifacts_dir: "{{ playbook_dir }}/.artifacts"
    cp_root: /opt/context-pilot
    cp_seed_admin_email: "{{ cp_admin_email | default('admin@admin.fr') }}"
    sheets_dir: "{{ playbook_dir }}/out"
    gh_repo: bigmoostache/context-pilot
    cp_release: "{{ release | default('latest') }}"
    appliance_bundle_url: >-
      https://github.com/{{ gh_repo }}/releases/{{ 'latest/download' if cp_release == 'latest' else 'download/' + cp_release }}/cpilot-appliance-aarch64.tar.gz
    caddy_url: "https://caddyserver.com/api/download?os=linux&arch=arm64"
  tasks:
    - name: Fetch the release bundle + Caddy (control node, once)
      ansible.builtin.include_tasks:
        file: tasks/fetch.yml
        apply:
          delegate_to: localhost
          run_once: true
    - name: Ship binaries, SPA, systemd units, Caddyfile
      ansible.builtin.include_tasks: tasks/deploy-debian.yml
    - name: Install this client's provider API keys (providers.env)
      ansible.builtin.include_tasks: tasks/keys.yml
    - name: Seed the unique admin (seed.env + delivery sheet)
      ansible.builtin.include_tasks: tasks/seed.yml
    - name: Start the services and wait until ready
      ansible.builtin.include_tasks: tasks/start-debian.yml

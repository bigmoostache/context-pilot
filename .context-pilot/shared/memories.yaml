    - cp-orchestrator = BACKEND-only

    ### Crate test counts (all green under full lint gate)
    - cp-wire: 74 (59 lib + 8 framing_integrity + 7 protocol)
    - cp-oplog: 56 COMPLETE
    - cp-mod-bridge: 48 COMPLETE
    - cp-orchestrator: 85 (77 lib + 4 registry_channel + 4 supervisor_lifecycle)

    ### Phase 28 (X795) DONE+committed 1bb1136: tests/supervisor_lifecycle.rs (4)
    Black-box public-API + real processes: (1) SIGTERM→grace→SIGKILL escalation vs trap-TERM shell; (2) fleet teardown 3 agents all ESRCH-gone; (3) adopted foreign signalled on stop status.signal()==15; (4) check_liveness Exited+Vanished one pass. pid_present via nix kill ESRCH.

    ### CRITICAL lint gotchas (carry to phases 29-30)
    - Each tests/ file is a SEPARATE crate target. per-target unused-crate-dependencies (forbid) flags every dep the file doesn't directly name → `use <crate> as _;` block at top.
    - dev-deps unnamed by LIB code flag LIB-TEST target; unnamed by BIN code flag BIN-TEST target → `#[cfg(test)] use <crate> as _;` in lib.rs AND main.rs (cp-mod-bridge needed both).
    - CB3 rust-check LIB-ONLY — ALWAYS `cargo test -p <crate>` (or --test <name>) before commit.
    - Test lints: let-underscore-drop, unused-results, unused-crate-dependencies, unused-imports. No `as u8`/to_le_bytes.
    - M62: real connect/accept UDS propagate EOF reliably; socketpair shutdown(Write) does NOT.

    ### Remaining: phases 29-30 (X796-X797) + capstone Phase 20 (X787)
    - 29 (X796): backend services — MaterializedView fold-every-kind + Checkpoint authoritative I5, CostBreaker high-water V9 + poison fail-closed + rebuild, StreamHub fan-out/overflow-evict-oldest/per-sub-degraded/cap0/mark_reconciled.
    - 30 (X797): transport + e2e — ticket single-use/TTL/unknown, REST rev-envelope+cmd receipt+body-hydrate+404/400, SSE Last-Event-ID replay-by-rev + gap→resync, END-TO-END loopback spawn→POST→journal→Tailer→SSE→reconnect, breaker-tripped-blocks, soak FD/thread/mem.
    - 20 (X787) LAST: M4 ship gate = full V1-V12 fault matrix + observability + soak + sign-off.


  success_message: Lint exceptions OK ✓
  is_global: true
  script_content: bash .github/checks/check-lint-exceptions.sh
bfa6214cc0381ff8:
  name: lint-integrity
  description: Verify lint config hash chain integrity (protected files unchanged)
  pattern: '*.rs'
  blocking: true
  timeout_secs: 10
  success_message: Lint integrity OK ✓
  is_global: true
  script_content: bash .github/checks/check-lint-config.sh
e9df8b57febadf23:
  name: rust-clippy
  description: Run cargo clippy on Rust file changes — catches compilation errors + lint warnings
  pattern: '*.rs'
  blocking: true
  timeout_secs: 60
  success_message: Clippy passed ✓
  is_global: true
  script_content: cargo clippy --workspace --all-targets 2>&1
fa0efdd3f8eac26f:

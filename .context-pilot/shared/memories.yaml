f5d97b1e7a01c317:
  tl_dr: ALIGNMENT EPIC (T18/T120/X818) COMPLETE + T123 send-flicker FIXED + T254 double-render FIXED. STATE MGMT migrated to TanStack Query (607cce4). Double-render fix shipped c5bc2fc. Details in contents.
  contents: |-
    ## TANSTACK QUERY MIGRATION (T254 / X879, commit 607cce4 pushed 2026-06-19)
    User (N4833): 'everything is bugged as fuck' — replace hand-rolled live.ts state mgmt with TanStack Query, professional fix for the T123 send-flicker bug CLASS.

    SHIPPED — web/ now uses @tanstack/react-query v5.101:
    - web/src/lib/queryClient.ts (NEW): one QueryClient. staleTime Infinity; refetchOnFocus/Mount/Reconnect OFF (push plane owns freshness). BACKSTOP_POLL_MS=15s per-hook refetchInterval = last-resort only. Structural sharing makes T123 delta-burst-clobber structurally impossible.
    - web/src/lib/sync.ts (NEW): per-agent SSE->cache bridge. ensureSync(agentId) = one idempotent subscription/agent (never torn down). `delta` -> parse rev OpEntry -> fold into ['threads',id]+['agent',id] via setQueryData FUNCTIONAL updater (applyThreadDelta/applyAgentDelta moved here), rev high-water guard (Map<agentId,number>) drops replay dupes, null verdict -> invalidate that key. `invalidate` -> invalidateQueries predicate targeting agent's INSPECTION caches only (DELTA_COVERED={threads,agent} exempt). `resync` -> refresh all. Owns OpEntry/OpEntryKind types, qk{} query-key registry, mergeThreadLogs (non-destructive poll reconcile preserved).
    - web/src/lib/live.ts (REWRITE): every hook = thin useLive() wrapper over useQuery, returns legacy LiveQueryResult{data,loading,error,refetch} so ALL ~24 consumers untouched. useLive calls ensureSync(agentId) in useEffect. useThreads queryFn merges non-destructively: mergeThreadLogs(getQueryData(prev), await fetchThreads()) so backstop poll can't clobber a delta-applied msg. useStreamingTokens = rAF-batched §7 token buffer carried over (clear deferred to rAF via dirty+schedule, NOT sync setState — fixed react-hooks/set-state-in-effect lint). useMetrics/useFleetMetrics brisk 4s poll (§19, not delta-covered). sendCommand/mintTicket/downloadFile passthrough; sendCommand does NOT invalidate (push plane sole freshness).
    - web/src/main.tsx: QueryClientProvider mounted.


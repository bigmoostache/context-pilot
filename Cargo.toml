cast_abs_to_unsigned = "forbid"
# Sometimes intentional for FFI
cast_enum_truncation = "forbid"
# Can be intentional in some macro designs
crate_in_macro_def = "forbid"
# Documentation style issue
doc_nested_refdefs = "forbid"
# Documentation style issue
doc_suspicious_footnotes = "forbid"
# Style, not a bug
empty_line_after_doc_comments = "forbid"
# Style, not a bug
empty_line_after_outer_attr = "forbid"
# Informational
infallible_try_from = "forbid"
# Can have false positives with complex macros
macro_metavars_in_unsafe = "forbid"
# Style preference
manual_unwrap_or_default = "forbid"
# Good practice but not a bug
missing_transmute_annotations = "forbid"
# Style
needless_character_iteration = "forbid"
# Style
needless_maybe_sized = "forbid"
# Sometimes intentional
repeat_vec_with_capacity = "forbid"
# Worth knowing but not always a bug
repr_packed_without_abi = "forbid"
# Has false positives with custom numeric types
suspicious_arithmetic_impl = "forbid"
# Has false positives
suspicious_op_assign_impl = "forbid"
# Style improvement
unnecessary_get_then_check = "forbid"
# Style
unnecessary_option_map_or_else = "forbid"
# Style
unnecessary_result_map_or_else = "forbid"

# ============================
# Pedantic → warn
# ============================
# ============================
# Pedantic → warn (C11)
# ============================
# Match on bool — prefer if/else
match_bool = "forbid"
# Identical match arms that can be combined
match_same_arms = "forbid"
# match result { Err(_) => ... } — use specific error
match_wild_err_arm = "forbid"
# Public functions returning Result should document errors
missing_errors_doc = "forbid"
# Custom Debug impls should include all fields
missing_fields_in_debug = "forbid"

# ============================
# Pedantic → warn (C12)
# ============================
# Public functions that can panic should document it
missing_panics_doc = "forbid"
# Functions returning useful values should be #[must_use]
must_use_candidate = "forbid"
# Prefer logical operators (&&/||) over bitwise (&/|) for bools
needless_bitwise_bool = "forbid"
# Prefer restructuring loop over `continue`
needless_continue = "forbid"
# Prefer iterator methods over `for` + side effects
needless_for_each = "forbid"

# ============================
# Pedantic → warn (C13)
# ============================
# Remove unnecessary raw string hash symbols (r#"foo"# → r"foo")
needless_raw_string_hashes = "forbid"
# #[no_mangle] on Rust ABI functions is suspicious — usually needs extern "C"
no_mangle_with_rust_abi = "forbid"
# Option<Option<T>> is confusing — flatten or use a custom enum
option_option = "forbid"
# Use ptr::cast::<T>() instead of `as *const T` / `as *mut T`
ptr_as_ptr = "forbid"
# Use ptr.cast_const() / ptr.cast_mut() instead of `as *const T` / `as *mut T`
ptr_cast_constness = "forbid"

# ============================
# Pedantic → warn (C14)
# ============================
# Prefer `0..n` over `0..=n-1`
range_minus_one = "forbid"
# Prefer `0..=n` over `0..n+1`
range_plus_one = "forbid"
# Use method reference instead of closure: `.map(|x| x.to_string())` → `.map(ToString::to_string)`
redundant_closure_for_method_calls = "forbid"
# Use ptr::from_ref() / ptr::from_mut() instead of `&x as *const T`
ref_as_ptr = "forbid"
# Use `Option<&T>` instead of `&Option<T>` in function args
ref_option = "forbid"

# ============================
# Pedantic → warn (C15)
# ============================
# Detect `Option<&Option<T>>` — usually a mistake
ref_option_ref = "forbid"
# Methods returning `Self` should be `#[must_use]`
return_self_not_must_use = "forbid"
# Detect identical function calls in both branches of an if/else
same_functions_in_if_condition = "forbid"
# `#[should_panic]` tests should specify `expected` string
should_panic_without_expect = "forbid"
# Use `.first()` instead of `.get(0)` — clearer intent
get_first = "forbid"
# Use unstable sort for primitives (faster, no allocation)
stable_sort_primitive = "forbid"

# ============================
# Pedantic → warn (C16)
# ============================
# Use `.lines()` instead of `.split('\n')`
str_split_at_newline = "forbid"
# Use `+=` for string concatenation instead of `= ... + &s`
string_add_assign = "forbid"
# Flag structs with >3 bool fields
struct_excessive_bools = "forbid"
# Detect field names that redundantly include the struct name
struct_field_names = "forbid"
# Use ptr::cast instead of transmute between pointer types
transmute_ptr_to_ptr = "forbid"

# ============================
# Pedantic → warn (C17)
# ============================
# Pass small Copy types by value, not by reference
trivially_copy_pass_by_ref = "forbid"
# Inline format args: `format!("{x}")` not `format!("{}", x)`
uninlined_format_args = "forbid"
# Return T instead of Box<T> when the type is known at compile time
unnecessary_box_returns = "forbid"
# Use `collect::<String>()` instead of `collect::<Vec<_>>().join("")`
unnecessary_join = "forbid"
# Don't wrap return values in Option/Result when they're always Some/Ok
unnecessary_wraps = "forbid"

# ============================
# Pedantic → warn (C18)
# ============================
# Flatten nested `A | B | C` patterns in match arms
unnested_or_patterns = "forbid"
# Add underscores for readability: `1_000_000` not `1000000`
unreadable_literal = "forbid"
# Warn when Deserialize is derived on a struct with unsafe fields
unsafe_derive_deserialize = "forbid"
# Detect async functions that don't use .await
unused_async = "forbid"
# Detect methods that don't use `self`
unused_self = "forbid"

# ============================
# Pedantic → warn (C19)
# ============================
# Flag use of `_`-prefixed bindings after they're declared
used_underscore_binding = "forbid"
# Flag items prefixed with `_` that are actually used
used_underscore_items = "forbid"
# Prefer `.count_ones() != 0` over `x & (x - 1) != 0` for power-of-two checks
verbose_bit_mask = "forbid"
# Prefer explicit imports over glob `use foo::*`
wildcard_imports = "forbid"
# Use `HashSet` instead of `HashMap<K, ()>`
zero_sized_map_values = "forbid"

# ============================
# Pedantic → warn (C1-C10, prior batches)
# ============================
# Use clone_from when possible
assigning_clones = "forbid"
# Use as/into instead of if bool { 1 } else { 0 }
bool_to_int_with_if = "forbid"
# Use addr_of! instead of &x as *const
borrow_as_ptr = "forbid"
# Always use case-insensitive extension comparison
case_sensitive_file_extension_comparisons = "forbid"
# Use From instead of as for lossless casts
cast_lossless = "forbid"

# ============================
# Nursery → warn (cherry-picked stable lints)
# ============================
# Detect `as_ptr()` followed by `cast_mut()` — use `as_mut_ptr()` instead
as_ptr_cast_mut = "forbid"
# Detect identical code at start/end of if/else branches — factor out
branches_sharing_code = "forbid"
# Collection populated but never read — dead code
collection_is_never_read = "forbid"
# `debug_assert!(x.mutating_call())` — side effect lost in release builds
debug_assert_with_mut_call = "forbid"
# Derive `Eq` when `PartialEq` is derived and all fields are `Eq`
derive_partial_eq_without_eq = "forbid"
# `impl From<T>` that can panic — use `TryFrom` instead
fallible_impl_from = "forbid"
# Futures that are not `Send` — problematic for multi-threaded executors
future_not_send = "forbid"
# Functions that could be `const fn` but aren't
missing_const_for_fn = "forbid"
# `&mut T` parameter that doesn't need mutability — use `&T`
needless_pass_by_ref_mut = "forbid"
# Prefer `map_or` / `map_or_else` over `if let Some(x) = opt { ... } else { ... }`
option_if_let_else = "forbid"
# Lock/guard held across match scrutinee — potential deadlock
significant_drop_in_scrutinee = "forbid"
# Drop guards held longer than needed — tighten scope
significant_drop_tightening = "forbid"
# `T: A + B` where `B: A` — `A` bound is redundant
trait_duplication_in_bounds = "forbid"
# Same as above but for `where` clauses
type_repetition_in_bounds = "forbid"
# `Foo { a: a, b: b }` where fields already match — use `Foo { a, b }`
unnecessary_struct_initialization = "forbid"
# Use `Self` instead of the type name inside impl blocks
use_self = "forbid"
# Flag `Mutex<T>` where `AtomicT` would suffice — avoid lock overhead
mutex_atomic = "forbid"
# Flag `let mut v = Vec::new(); v.push(x);` — use `vec![x]` or `with_capacity`
vec_init_then_push = "forbid"

# ============================
# Restriction → warn (carefully selected)
# ============================
# Flag bare #[allow(...)] — prefer #[expect(...)] which errors when lint no longer fires
allow_attributes = "forbid"
# Require reason on all #[allow/expect] — forces documentation of suppression rationale
allow_attributes_without_reason = "forbid"
# Flag `cfg(not(test))` — usually a code smell, prefer `cfg(test)` with inverted logic
cfg_not_test = "forbid"
# Use `Arc::clone(&x)` instead of `x.clone()` — makes ref-count clone explicit
clone_on_ref_ptr = "forbid"
# Flag `dbg!()` macro — should not ship to production
dbg_macro = "forbid"
# Flag empty `Drop` impls — `impl Drop for T {}` is a no-op that prevents optimizations
empty_drop = "forbid"
# Flag `Foo {}` on unit variants — prefer `Foo` without brackets
empty_enum_variants_with_brackets = "forbid"
# Flag `struct Foo {}` — prefer `struct Foo;` for unit structs
empty_structs_with_brackets = "forbid"
# Flag `Error` in error type names — `struct FooError` not `struct Error`
error_impl_error = "forbid"
# Flag `std::process::exit()` — prefer returning from main
exit = "forbid"
# Flag `.expect()` — prefer explicit error handling or `unwrap_or`
expect_used = "forbid"
# Flag `fn as usize` — function-to-integer casts are suspicious
fn_to_numeric_cast_any = "forbid"
# Flag `map[key]` indexing — prefer `.get()` which returns Option
get_unwrap = "forbid"
# Flag infinite loops without break — `loop {}` without exit path
infinite_loop = "forbid"
# Flag `let _ = must_use_fn()` — don't silently discard important results
let_underscore_must_use = "forbid"
# Flag float literals that lose precision — `0.1` != exact `0.1_f64`
lossy_float_literal = "forbid"
# Require messages on all assert! macros — `assert!(x, "reason")` not just `assert!(x)`
missing_assert_message = "forbid"
# Flag `panic!()` — prefer returning Result or specific error types
panic = "deny"
# Flag `eprint!`/`eprintln!` — prefer structured logging
print_stderr = "forbid"
# Flag `print!`/`println!` — prefer structured logging
print_stdout = "forbid"
# Flag `..` in fully-bound struct patterns — be explicit about all fields
rest_pat_in_fully_bound_structs = "forbid"
# Flag `String + &str` concatenation — prefer `format!()` or `push_str()`
string_add = "forbid"
# Flag `todo!()` — should not ship to production
todo = "forbid"
# Require `// SAFETY:` comment on all unsafe blocks
undocumented_unsafe_blocks = "forbid"
# Flag `unimplemented!()` — should not ship to production
unimplemented = "forbid"
# Flag `// SAFETY:` comments without nearby unsafe — stale safety docs
unnecessary_safety_comment = "forbid"
# Flag `# Safety` doc sections without unsafe in the function
unnecessary_safety_doc = "forbid"
# Flag `unreachable!()` — prefer compile-time guarantees or specific panics
unreachable = "forbid"
# Flag `.unwrap()` — prefer explicit error handling
unwrap_used = "forbid"
# Flag `_` in match on non-exhaustive enums — be explicit about variants
wildcard_enum_match_arm = "forbid"
# Flag `std::mem::forget()` — prevents memory/resource leaks
mem_forget = "forbid"
# Flag `Rc<Mutex<T>>` — almost always a design error, use `Arc<Mutex<T>>`
rc_mutex = "forbid"
# Flag `&str[start..end]` slicing — may panic on UTF-8 boundaries
string_slice = "forbid"

# ============================
# Pedantic/Restriction/Nursery — Tier additions
# ============================
# Catches `"hello {name}"` without format! — false-positives on .replace() templates
literal_string_with_formatting_args = "forbid"
# PathBuf::push with absolute path silently overwrites — always a bug
path_buf_push_overwrite = "forbid"
# Operator precedence bugs in grouped comparisons
suspicious_operation_groupings = "forbid"
# `2 ^ 8` is XOR not pow — always a bug
suspicious_xor_used_as_pow = "forbid"
# Panicking inside `-> Result` defeats the purpose
panic_in_result_fn = "forbid"
# `.unwrap()` inside `-> Result` — propagate instead
unwrap_in_result = "forbid"
# `.ok()` discarded silently — handle the Result
unused_result_ok = "forbid"
# `impl<B, A> Foo<A, B>` — param order mismatch
mismatching_type_param_order = "forbid"
# Use std LazyLock instead of lazy_static (edition 2024)
non_std_lazy_statics = "forbid"
# Tests belong in `#[cfg(test)] mod tests`
tests_outside_test_module = "forbid"
# `.unwrap_or(expensive())` — use `unwrap_or_else`
or_fun_call = "forbid"
# `.collect().iter()` — skip the collect
needless_collect = "forbid"
# `set.contains() + set.insert()` — use entry API
set_contains_or_insert = "forbid"
# `.as_ref().cloned()` → `.clone()`
option_as_ref_cloned = "forbid"
# `"foo".as_bytes()` → `b"foo"`
string_lit_as_bytes = "forbid"
# Concise doc summary paragraphs
too_long_first_doc_paragraph = "forbid"
# `push_str(&format!(...))` → `write!`
format_push_string = "forbid"
# `.split("x")` → `.split('x')`
single_char_pattern = "forbid"
# `{:?}` where `{}` works (Display impl available)
unnecessary_debug_formatting = "forbid"
# Trailing `;` in expression position
unnecessary_semicolon = "forbid"
# `.map_err(|_| ...)` loses error info
map_err_ignore = "forbid"
# Use `fs::read_to_string` instead of open+read
verbose_file_reads = "forbid"
# `PathBuf::new()` + `.push()` → `PathBuf::from()`
pathbuf_init_then_push = "forbid"
# Trait impl renames parameters vs trait definition
renamed_function_params = "forbid"
# `{:?}` in production code — prefer Display
use_debug = "forbid"
# `let x: Foo = Foo::new()` — redundant annotation
redundant_type_annotations = "forbid"

# ============================
# Taskforce lints — high-value, systematic migration
# ============================
# Forces explicit checked arithmetic instead of silent panics
arithmetic_side_effects = "deny"
# Forces .get() instead of [] indexing — explicit panic handling
indexing_slicing = "forbid"
# `as` silently truncates; replacing with TryFrom is strictly safer
# DISABLED: as_conversions = "forbid"
# Catches real bugs comparing floats to constants
float_cmp_const = "forbid"
# Forces explicit intent on integer division
# DISABLED: integer_division = "forbid"
# Same rationale as integer_division
modulo_arithmetic = "forbid"
# Eliminates subtle type inference bugs with numeric literals
# DISABLED: default_numeric_fallback = "forbid"
# Improves match clarity, mechanical fixes
# DISABLED: pattern_type_mismatch = "forbid"
# Docs on private items — pays dividends forever
missing_docs_in_private_items = "forbid"
# Forces deliberate API design with #[non_exhaustive]
# DISABLED: exhaustive_enums = "forbid"
# Same — forces deliberate struct API design
# DISABLED: exhaustive_structs = "forbid"
# Pure mechanical cleanup, free quality
# DISABLED: redundant_pub_crate = "forbid"
# Mechanical, zero controversy
map_with_unused_argument_over_ranges = "forbid"
# Real correctness bug class in float loops
while_float = "forbid"
# Free perf for numerics
imprecise_flops = "forbid"
# Free perf for numerics
suboptimal_flops = "forbid"
# Audit and deduplicate deps
# Transitive deps (typst→hayagriva→thiserror 1, notify→inotify→bitflags 1, proc-macros→syn 1)
# Cannot fix without upstream migration. Revisit when typst ecosystem upgrades.
multiple_crate_versions = "allow"
# Forces explicit todo!() or real impls — no silent default footguns
missing_trait_methods = "deny"
# Enforces String::from consistency over .to_string() on &str
# DISABLED: str_to_string = "forbid"
# Prevents accidental drops of MustUse types
# DISABLED: let_underscore_untyped = "forbid"
# Catches debug-logging mistakes with pointer formatting
pointer_format = "forbid"
# Forces exhaustiveness thinking in if-else chains
# DISABLED: else_if_without_else = "forbid"
# Unrelated shadows are genuinely confusing
shadow_unrelated = "forbid"
# Mechanical, makes docs professional
# DISABLED: doc_paragraphs_missing_punctuation = "forbid"
# Named lifetimes improve complex code readability
single_char_lifetime_names = "forbid"
# Audit re-exports are intentional
pub_use = "forbid"
# Isolating unsafe ops is a strict quality win
multiple_unsafe_ops_per_block = "forbid"
# Prevents genuine UB with unions
default_union_representation = "forbid"

# ============================
# Nursery — remaining (warn)
# ============================
clear_with_drain = "forbid"
coerce_container_to_any = "forbid"
doc_link_code = "forbid"
equatable_if_let = "forbid"
iter_on_empty_collections = "forbid"
iter_on_single_items = "forbid"
iter_with_drain = "forbid"
large_stack_frames = "forbid"
non_send_fields_in_send_ty = "forbid"
nonstandard_macro_braces = "forbid"
read_zero_byte_vec = "forbid"
single_option_map = "forbid"
trailing_empty_array = "forbid"
transmute_undefined_repr = "forbid"
trivial_regex = "forbid"
tuple_array_conversions = "forbid"
uninhabited_references = "forbid"
unused_peekable = "forbid"
unused_rounding = "forbid"
useless_let_if_seq = "forbid"
volatile_composites = "forbid"

# ============================
# Pedantic — remaining (warn)
# ============================
expl_impl_clone_on_copy = "forbid"
format_collect = "forbid"
inline_always = "forbid"
invalid_upcast_comparisons = "forbid"
ip_constant = "forbid"
large_digit_groups = "forbid"
linkedlist = "forbid"
macro_use_imports = "forbid"
manual_is_power_of_two = "forbid"
manual_midpoint = "forbid"
maybe_infinite_iter = "forbid"
mut_mut = "forbid"
naive_bytecount = "forbid"
no_effect_underscore_binding = "forbid"
pub_underscore_fields = "forbid"
ref_binding_to_reference = "forbid"
self_only_used_in_recursion = "forbid"
# =====================
similar_names = "forbid"
# DISABLED: too_many_lines = "forbid"
unchecked_time_subtraction = "forbid"
unicode_not_nfc = "forbid"
unnecessary_literal_bound = "forbid"

# ============================
# Restriction — remaining (warn)
# ============================
as_pointer_underscore = "forbid"
as_underscore = "forbid"
assertions_on_result_states = "forbid"
# DISABLED: cognitive_complexity = "forbid"
create_dir = "forbid"
decimal_literal_representation = "forbid"
deref_by_slicing = "forbid"
doc_include_without_cfg = "forbid"
field_scoped_visibility_modifiers = "forbid"
filetype_is_file = "forbid"
if_then_some_else_none = "forbid"
impl_trait_in_params = "forbid"
integer_division_remainder_used = "deny"
iter_over_hash_type = "forbid"
large_include_file = "forbid"
missing_asserts_for_indexing = "forbid"
mixed_read_write_in_expression = "forbid"
module_name_repetitions = "forbid"

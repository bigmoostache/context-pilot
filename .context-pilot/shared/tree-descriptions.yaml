  description: 'Orchestration backend design doc, v4 (branch maquette). Two-plane architecture: durable control plane (disk + manifest, authoritative) + ephemeral stream plane (UDS token tee, sub-ms, droppable). 10 invariants I1-I10: single-writer flock(FD-inherited across deadman re-exec H5), atomic+power-safe writes (data fsync→manifest rename→dir fsync), manifest snapshot consistency (no mtime), semantic dedup_token idempotency, LAZY backend rebuild, single-writer commit transaction (I8: messages participate in rev, atomic cross-worker snapshot), capability-token command auth (I9), cross-plane causal ordering (I10: self-describing MessageStart + frontend orphan buffering). Phase/status on DURABLE plane (never lossy). Streaming tee = lock-free SPSC enqueue + dedicated publisher thread. Frontend↔backend = REST + ONE auth''d WebSocket (bearer token in handshake, no CORS reliance) + client action queue/replay on backend-down. Security: cap tokens, WS bearer, spawn allow-list, global CostBreaker. N-1 major version compat. §20 problem register (9 categories, all ✅/🔵). §23 maps all 18 adversarial-review issues→v4 resolution. Companion: architecture-adversarial-analysis.md. NOT implemented (discussion).'

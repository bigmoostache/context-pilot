# Rust convention, LLMs must follow it
non_camel_case_types = "deny"
# Gap in range match — always a bug
non_contiguous_range_endpoints = "forbid"
# panic!(variable) instead of panic!("{}", variable) — always fix
non_fmt_panics = "forbid"
# impl in weird scopes — always wrong
non_local_definitions = "forbid"
# Foo { x: x } instead of Foo { x } — always fix
non_shorthand_field_patterns = "forbid"
# Rust convention, LLMs must follow it
non_snake_case = "forbid"
# Rust convention, LLMs must follow it
non_upper_case_globals = "deny"
# Calling .clone() on &T where T: !Clone does nothing — always a bug
noop_method_call = "forbid"
# Overlapping ranges in match — always a bug
overlapping_range_endpoints = "forbid"
# x; as a statement with no effect — always a bug
path_statements = "forbid"

  - path: "crates/cp-wire/src/framing.rs"
    match: "const-fn narrowing after `& BYTE_MASK` is provably exact"
    reason: >
      u32_to_le() masks the low 8 bits with `& BYTE_MASK` before each
      `as u8`, so the narrowing is provably exact. try_from/From are not
      const-callable, and clippy::little_endian_bytes (forbid) rejects the
      to_le_bytes shortcut — the two restriction lints leave the masked `as`
      form as the only path.
    strategy: >
      Irreducible — clippy::little_endian_bytes forbids to_le_bytes and From
      is not const-stable, so the masked const-fn narrowing is the only option.


---
# Deploy Context Pilot onto an ALREADY-INSTALLED Armbian/Debian box (systemd),
# over the LAN.
#
# Layout: systemd units (context-pilot + caddy), cp_root=/opt/context-pilot (the
# Debian rootfs is the whole disk). A stock Armbian box has nothing fighting for
# :80/:443 and no default REJECT zone, so there is no port/firewall juggling.
#
# Pipeline: fetch (artifact, control node) → deploy (binaries/SPA/units/Caddyfile)
# → keys (providers.env) → seed (admin write-once + delivery sheet) → start.
#
# Usage (LAN, key auth):
#   ./.venv/bin/ansible-playbook -i <inventory> deploy/ansible/site.yml \
#       -e release=latest -e cp_admin_email=you@example.com
#   # provider keys (optional): -e @deploy/ansible/<name>.local.yml  (cp_provider_keys dict)
#   # use the local build bundle instead of a GitHub release: -e release=local

- name: Deploy + provision Context Pilot on Armbian/Debian 13 (systemd, LAN)
  hosts: all
  become: false            # we log in as root; minimal Armbian may lack sudo
  gather_facts: false
  vars:
    repo_root: "{{ playbook_dir | dirname | dirname }}"
    artifacts_dir: "{{ playbook_dir }}/.artifacts"
    cp_root: /opt/context-pilot
    # Two seeded accounts (design §13.4): the vendor `superadmin` + client `admin`.
    cp_seed_superadmin_email: "{{ cp_superadmin_email | default('vendor@context-pilot.internal') }}"
    cp_seed_admin_email: "{{ cp_admin_email | default('admin@admin.fr') }}"
    sheets_dir: "{{ playbook_dir }}/out"
    gh_repo: bigmoostache/context-pilot
    cp_release: "{{ release | default('latest') }}"
    appliance_bundle_url: >-
      https://github.com/{{ gh_repo }}/releases/{{ 'latest/download' if cp_release == 'latest' else 'download/' + cp_release }}/cpilot-appliance-aarch64.tar.gz
    caddy_url: "https://caddyserver.com/api/download?os=linux&arch=arm64"
    # Photonicat 2 mini-display (GC9307 SPI LCD) — built + installed on the box.
    cp_install_display: "{{ install_display | default(true) | bool }}"
    cp_display_repo: https://github.com/photonicat/photonicat2_mini_display.git
    cp_display_ref: "{{ display_ref | default('main') }}"
    cp_display_src: /opt/pcat2_mini_display
    cp_display_bin: /usr/local/bin/pcat2_mini_display
    # Without pcat-manager the driver can't read the DC rail, so it treats the box
    # as "on battery" and blanks the LCD after the 60s battery dimmer. Stretch it.
    cp_display_battery_dimmer_seconds: "{{ display_battery_dimmer_seconds | default(86400) }}"
  tasks:
    - name: Fetch the release bundle + Caddy (control node, once)
      ansible.builtin.include_tasks:
        file: tasks/fetch.yml
        apply:
          delegate_to: localhost
          run_once: true
    - name: Ship binaries, SPA, systemd units, Caddyfile
      ansible.builtin.include_tasks: tasks/deploy.yml
    - name: Install this client's provider API keys (providers.env)
      ansible.builtin.include_tasks: tasks/keys.yml
    - name: Seed the unique admin (seed.env + delivery sheet)
      ansible.builtin.include_tasks: tasks/seed.yml
    - name: Start the services and wait until ready
      ansible.builtin.include_tasks: tasks/start.yml
    - name: Install the Photonicat mini-display driver (GC9307 SPI LCD)
      ansible.builtin.include_tasks: tasks/display.yml
      when: cp_install_display | bool

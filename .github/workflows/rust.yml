name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # Pin Rust 1.95.0 — matches local dev. The workspace lint config forbids
    # several lints that only exist in Rust 1.94+, so the toolchain must be
    # >= 1.94. (The former 1.93.0 pin for matrix-sdk is obsolete — that
    # dependency was removed.)
    - name: Install Rust 1.95.0
      run: |
        rustup toolchain install 1.95.0 --profile minimal --component rustfmt,clippy
        rustup default 1.95.0

    - name: Check formatting
      run: cargo fmt -- --check

    - name: Clippy lints
      run: cargo clippy -- -D warnings

    - name: Build
      run: cargo build --release --verbose

    - name: Run tests
      run: cargo test --verbose

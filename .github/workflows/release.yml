name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.95.0"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: cpilot-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: cpilot-linux-aarch64
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: cpilot-linux-aarch64-musl
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: cpilot-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: cpilot-macos-aarch64

    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ env.RUST_VERSION }}
        run: |
          rustup toolchain install ${{ env.RUST_VERSION }} --profile minimal
          rustup default ${{ env.RUST_VERSION }}
          rustup target add ${{ matrix.target }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: |
          cargo build --release --target ${{ matrix.target }}
          cargo build --release --target ${{ matrix.target }} -p cp-console-server

      - name: Build (cross)
        if: ${{ matrix.cross }}
        run: |
          cross build --release --target ${{ matrix.target }}
          cross build --release --target ${{ matrix.target }} -p cp-console-server

      - name: Package artifacts
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/tui staging/cpilot
          cp target/${{ matrix.target }}/release/cp-console-server staging/cp-console-server
          chmod 755 staging/*
          tar -czf ${{ matrix.artifact }}.tar.gz -C staging .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
          retention-days: 5

  appliance:
    name: Build appliance bundle (Photonicat, aarch64 musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ env.RUST_VERSION }}
        run: |
          rustup toolchain install ${{ env.RUST_VERSION }} --profile minimal
          rustup default ${{ env.RUST_VERSION }}
          rustup target add aarch64-unknown-linux-musl

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: appliance-aarch64-musl

      - name: Install cross
        uses: taiki-e/install-action@cross

      # Orchestrator (API+SPA server) + agent (tui), fully static musl. These are
      # the two binaries the procd service runs on the box; see
      # deploy/photonicat/init.d/context-pilot.init.
      - name: Build orchestrator + agent (cross, static musl)
        run: |
          cross build --release --target aarch64-unknown-linux-musl -p cp-orchestrator
          cross build --release --target aarch64-unknown-linux-musl --bin tui

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      # Relative same-origin API URLs so the SPA talks to the orchestrator that
      # serves it (one binary, one port). Runs tsc -b && vite build.
      - name: Build SPA (relative same-origin)
        run: pnpm run build
        working-directory: web
        env:
          VITE_API_URL: ""

      # Layout matches what the procd service expects under /mnt/data/context-pilot:
      #   bin/cp-orchestrator, bin/tui, web/<spa dist>
      - name: Package appliance bundle
        run: |
          mkdir -p staging/bin staging/web
          cp target/aarch64-unknown-linux-musl/release/cp-orchestrator staging/bin/
          cp target/aarch64-unknown-linux-musl/release/tui staging/bin/
          chmod 755 staging/bin/*
          cp -r web/dist/. staging/web/
          tar -czf cpilot-appliance-aarch64.tar.gz -C staging .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cpilot-appliance-aarch64
          path: cpilot-appliance-aarch64.tar.gz
          retention-days: 5

  release:
    name: Create Release
    needs: [build, appliance]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          short_sha=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=v${version}-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "name=v${version} (${short_sha})" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
          make_latest: true

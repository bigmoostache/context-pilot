4ac980654a7acaf1:
  tl_dr: 'T148/T262 SHIPPED: agent creation wired end-to-end (PTY spawn via portable-pty + TanStack useMutation). Proven live. Details in contents.'
  contents: |-
    ## T148/T262 — agent creation SHIPPED (X896) + agent RESTART SHIPPED (a96960a)

    ### RESTART (revive stale-binary agents) — commit a96960a pushed 2026-06-19
    User (main loop N4994): editing the test agent's config from the cockpit returned 502 'agent unreachable' — its running binary predated the Configure command handler. Wanted a reload/restart button.

    Backend: POST /api/agent/{id}/restart → rest/restart.rs restart_agent(state,id): resolve registry entry→folder+pid; supervisor::kill_pid(pid) FREE fn (SIGTERM→STOP_GRACE→SIGKILL, lock-free, works on EXTERNALLY-launched agents the supervisor never owned — no child handle to reap); if was_supervised, stop(key) to drop stale record; spawn_pty on the SAME folder (env CP_BRIDGE=1+CP_AGENTS_DIR) → re-registers under SAME id (id derived from folder). 202 {status:restarting,folder,pid}. Added supervisor.is_supervised(key)->bool. Route in transport/mod.rs route_rest. mod.rs re-exports restart_agent. All locked sections brief; kill (up to 5s grace) runs lock-free.

    Frontend: api.restartAgent(id)->RestartReceipt POST. live.ts useRestartAgent()=useMutation, onSuccess invalidate qk.fleet() + setTimeout 2s & 4s (respawn self-registers ~2-3s). AgentModal manage footer: Restart button (RefreshCw, animate-spin while pending, disabled on pending), calls restartAgent.mutate(agent.id) → onFlash + onClose; onError sets inline error banner.


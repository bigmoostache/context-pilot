      u128 Safe impl: lossy cast to f64.
    strategy: >
      Irreducible — fundamental floating-point limitation.

  - path: "crates/cp-base/src/cast.rs"
    match: "usize→f32: 24-bit mantissa cannot represent all pointer-width values"
    reason: >
      usize Safe impl: lossy cast to f32.
    strategy: >
      Irreducible — fundamental floating-point limitation.

  - path: "crates/cp-base/src/cast.rs"
    match: "usize→f64: 53-bit mantissa cannot represent all pointer-width values"
    reason: >
      usize Safe impl: lossy cast to f64.
    strategy: >
      Irreducible — fundamental floating-point limitation.

  - path: "crates/cp-base/src/cast.rs"
    match: "i32→f32: 24-bit mantissa cannot represent all 32-bit signed values"
    reason: >
      i32 Safe impl: lossy cast to f32. 24-bit mantissa too narrow.
    strategy: >
      Irreducible — fundamental floating-point limitation.

  - path: "crates/cp-base/src/cast.rs"
    match: "i64→f32: 24-bit mantissa cannot represent all 64-bit signed values"
    reason: >
      i64 Safe impl: lossy cast to f32.
    strategy: >
      Irreducible — fundamental floating-point limitation.

  - path: "crates/cp-base/src/cast.rs"
    match: "i64→f64: 53-bit mantissa cannot represent all 64-bit signed values"
    reason: >
      i64 Safe impl: lossy cast to f64.
    strategy: >
      Irreducible — fundamental floating-point limitation.

  - path: "crates/cp-base/src/cast.rs"
    match: "isize→f32: 24-bit mantissa cannot represent all pointer-width signed values"
    reason: >
      isize Safe impl: lossy cast to f32.
    strategy: >
      Irreducible — fundamental floating-point limitation.

  - path: "crates/cp-base/src/cast.rs"
    match: "isize→f64: 53-bit mantissa cannot represent all pointer-width signed values"
    reason: >
      isize Safe impl: lossy cast to f64.
    strategy: >
      Irreducible — fundamental floating-point limitation.

  - path: "crates/cp-base/src/cast.rs"
    match: "f64 Safe impl: saturating float"
    reason: >
      f64→integer casts in Safe impl. No TryFrom exists for
      float→int in std. Raw `as` with bounds checking is the
      only option.
    strategy: >
      Irreducible until std provides TryFrom<f64> for integers.

  - path: "crates/cp-base/src/cast.rs"
    match: "f32 Safe impl: saturating float"
    reason: >
      f32→integer casts in Safe impl. Same as f64 — no TryFrom
      path in std for float→int conversion.
    strategy: >
      Irreducible until std provides TryFrom<f32> for integers.

  # ── config/mod.rs: invariant_panic ──────────────────────────────────

  - path: "crates/cp-base/src/config/mod.rs"
    match: '#[expect(clippy::panic'
    reason: >
      invariant_panic() is the centralized panic point for build-time and
      config invariant violations (YAML not found, theme not loaded, module
      state not initialized). These are unrecoverable programmer errors,
      not runtime failures.
    strategy: >
      Consider compile-time validation (const fn / build.rs assertions)
      for YAML and theme invariants. For module state, explore a type-state
      pattern where uninitialized state is unrepresentable.

  # ── panels.rs: time_arith module ────────────────────────────────────

  - path: "crates/cp-base/src/panels.rs"
    match: 'sole choke-point for truncating time/division arithmetic'
    reason: >
      Centralized time/division arithmetic module: ms_to_secs(),
      secs_to_hms(), secs_to_hms_unwrapped(), div_const(). All
      truncating integer division is funneled here so no other file
      triggers integer_division_remainder_used or arithmetic_side_effects
      for division.
    strategy: >
      Fundamentally irreducible — integer truncation IS the desired
      behavior for millisecond-to-second conversion and const-divisor
      helpers. No alternative representation avoids it.

  # ── module_name_repetitions: names that include their module ────────
  # Types used via re-export where the shorter name conflicts with
  # common identifiers (reserved words, std types, or sibling types).



  # ── app/run/*: multiple_inherent_impl for App ─────────────────────────

  - path: "src/app/run/lifecycle.rs"
    match: 'App methods split across run/ submodules for readability'
    reason: >
      App methods are split across 7 submodules in src/app/run/ for
      readability. Each file contributes an impl App block covering a
      distinct concern (input, lifecycle, streaming, etc.). The lint
      fires on all impl blocks except the first (input.rs).
    strategy: >
      Could merge all impl blocks into a single file, but that would
      create a 2500+ line file. The split is intentional for navigation.

  - path: "src/app/run/reverie.rs"
    match: 'App methods split across run/ submodules for readability'
    reason: >
      See src/app/run/input.rs entry.
    strategy: >
      Same as input.rs.

  - path: "src/app/run/streaming.rs"
    match: 'App methods split across run/ submodules for readability'
    reason: >
      See src/app/run/input.rs entry.
    strategy: >
      Same as input.rs.

  - path: "src/app/run/tool_cleanup.rs"
    match: 'App methods split across run/ submodules for readability'
    reason: >
      See src/app/run/input.rs entry.
    strategy: >
      Same as input.rs.

  - path: "src/app/run/tool_pipeline.rs"
    match: 'App methods split across run/ submodules for readability'
    reason: >
      See src/app/run/input.rs entry.
    strategy: >
      Same as input.rs.

  - path: "src/app/run/watchers.rs"
    match: 'App methods split across run/ submodules for readability'
    reason: >
      See src/app/run/input.rs entry.
    strategy: >
      Same as input.rs.

  - path: "src/llms/mod.rs"
    match: "type_id/cause/provide are unstable or deprecated"
    reason: >
      impl Error for LlmError implements source(). The remaining
      unimplemented methods — type_id() (unstable), cause() (deprecated),
      and provide() (unstable) — cannot be meaningfully implemented on
      stable Rust. description() was removed (deprecated, Display covers it).
    strategy: >
      Irreducible on stable Rust. Re-evaluate when provide() stabilizes.


name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.97.1"

permissions:
  contents: read

# ── Six check families, one script each (.github/checks/check-<family>.sh),
#    every one invoked here with --ci and by its blocking callback with
#    --callback. CI and the callbacks run the SAME script — they cannot diverge
#    in coverage; the flag exists only for a future CI-vs-local environment
#    tweak (today only rust-tests differs: --ci release build, --callback debug).
#    Jobs stay split for parallelism + shared toolchain/node setup; each job
#    just runs its family script(s).
jobs:
  rust:
    name: Rust (lints · tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ env.RUST_VERSION }}
        run: |
          rustup toolchain install ${{ env.RUST_VERSION }} --profile minimal --component rustfmt,clippy
          rustup default ${{ env.RUST_VERSION }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      # fmt · clippy · cargo check · lint-exception registry · vault-bypass
      - name: Rust lints
        run: .github/checks/check-rust-lints.sh --ci

      # cargo build --release · cargo test
      - name: Rust tests
        run: .github/checks/check-rust-tests.sh --ci

  structure:
    name: Structure (lengths · folders · web · chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # file-lengths ≤500 + folder-sizes ≤8 (Rust + web/src, unified) + hash chain
      - name: Structure
        run: .github/checks/check-structure.sh --ci

  contract:
    name: Contract (OpenAPI · TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ env.RUST_VERSION }}
        run: |
          rustup toolchain install ${{ env.RUST_VERSION }} --profile minimal
          rustup default ${{ env.RUST_VERSION }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          # Pinned to the lockfile origin (pnpm 11 workspace `packages:` +
          # `allowBuilds` model; see web/pnpm-workspace.yaml + M144).
          version: 11.6.0

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      # OpenAPI spec + route exhaustiveness · TS client codegen + drift ·
      # manual-fetch audit — the full Rust↔TypeScript wire contract.
      - name: API contract
        run: .github/checks/check-api-contract.sh --ci

  frontend:
    name: Frontend (ts-lints · ts-tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          # Match the lockfile origin (see the contract job + M144).
          version: 11.6.0

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      # eslint · prettier · stylelint · tsc · type-coverage · suppressions ·
      # rule-census · knip dead-code. The script self-cd's into web/, so no
      # working-directory is needed here.
      - name: TS lints
        run: .github/checks/check-ts-lints.sh --ci

      # Playwright e2e — documented stub (exit 0) until a dedicated ephemeral
      # stack is provisioned (see TODO(playwright) in the script).
      - name: TS tests
        run: .github/checks/check-ts-tests.sh --ci

      # mobile-components EXACT structural mirror of components: path parity +
      # leak guard + scaffold drift (needs node — lives in the Frontend job).
      - name: Mobile mirror
        run: .github/checks/check-mobile-mirror.sh

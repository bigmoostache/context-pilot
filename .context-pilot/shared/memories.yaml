  contents: |-
    Standard operating procedure when finishing work on any feature:
    1. **Build**: `cargo build --release` (with OPENSSL_NO_VENDOR=1 if needed)
    2. **Reload**: `system_reload` to apply changes to the running TUI
    3. **Commit + Push**: Include memories.yaml and tree-descriptions.yaml per M37
    4. **Clean context**: Close all work panels, update tree descriptions for changed files

    This is the captain's mandated sequence. Do NOT skip steps or reorder.

  # ── llms/mod.rs: hand-rolled date/time math ────────────────────────

  - path: "src/llms/mod.rs"
    match: 'hand-rolled date math'
    reason: >
      ms_to_iso8601() performs manual epoch-to-date conversion without
      chrono. All divisions/modulos are by non-zero constants, subtraction
      is guarded by loop conditions, addition is bounded by calendar range.
    strategy: >
      Replace with chrono crate for date formatting, which would eliminate
      the entire function.

  - path: "src/llms/mod.rs"
    match: 'canonical Gregorian leap year formula requires modulo'
    reason: >
      is_leap_year() uses y % 4, y % 100, y % 400 — the standard
      Gregorian leap year formula. Modulo IS the algorithm.
    strategy: >
      Replace with chrono crate, eliminating the need for is_leap_year().

  - path: "src/llms/mod.rs"
    match: 'time unit conversions: all divisions are by non-zero constants'
    reason: >
      format_time_delta() divides milliseconds by 1000, seconds by 60
      and 3600. All divisors are non-zero constants.
    strategy: >
      Could use cp-base::panels::time_arith helpers, but the function
      is self-contained and trivially correct.

  - path: "src/llms/mod.rs"
    match: 'std::error::Error: provide/type_id/cause are unstable or deprecated'
    reason: >
      impl Error for LlmError implements source() and description().
      provide(), type_id(), and cause() are either unstable or deprecated
      and cannot be meaningfully implemented.
    strategy: >
      Irreducible — the remaining unimplemented methods are either
      unstable (provide) or deprecated (cause).


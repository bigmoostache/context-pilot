# Example inventory — ONE GROUP PER CLIENT. Copy to inventory.ini and edit.
#
# `ansible_host` is the box's **Tailscale MagicDNS name** (<hostname>.<tailnet>.ts.net),
# NOT a LAN IP. The box reaches us over the tailnet (outbound-only, through the
# client's NAT), so the control node running Ansible must itself be on the tailnet.
# This removes the "same LAN as the box" constraint — deploy from anywhere.
#
# Auth: Tailscale SSH (ACL-driven, no SSH key to distribute) — see
# deploy/PROVISIONING.md. The box is enrolled with `tag:cp-<client>` and the
# tailnet policy file allows `group:ops -> tag:cp-<client>` as root.
#
# Break-glass (Tailscale/DERP down, on-site): target the box's LAN IP directly
# with a key — see the commented LAN line under acme-01.
#
# Each client's provider API keys live in group_vars/<client>/vault.yml
# (ansible-vault encrypted), so different clients get different keys.
#
#   # one client:
#   ansible-playbook -i inventory.ini deploy/ansible/site.yml --limit acme --ask-vault-pass
#   # the whole fleet:
#   ansible-playbook -i inventory.ini deploy/ansible/site.yml --ask-vault-pass

[acme]
acme-01 ansible_host=cp-test-01.tail7390da.ts.net ansible_user=root ansible_python_interpreter=/usr/bin/python3
# break-glass (LAN, key-based): acme-01 ansible_host=192.168.1.116 ...
# acme-02 ansible_host=acme-02.tail7390da.ts.net ansible_user=root ansible_python_interpreter=/usr/bin/python3

[globex]
# globex-01 ansible_host=globex-01.tail7390da.ts.net ansible_user=root ansible_python_interpreter=/usr/bin/python3

# Connection defaults for every host above.
[all:vars]
ansible_ssh_common_args=-o StrictHostKeyChecking=accept-new

# Curated list of allowed #[expect(...)] and #[allow(...)] annotations.
#
# Every occurrence in the codebase MUST have an entry here, or the
# structure-check will fire an ERROR. This keeps lint suppression
# intentional, visible, and continuously reviewed.
#
# Fields:
#   path          — file path relative to repo root
#   match         — exact string that appears on the annotation line(s)
#   reason        — why this exception is currently accepted
#   strategy      — ideas to eventually eliminate it
#
# To add a new exception: append an entry, run the structure-check,
# and ensure it passes. To remove one: delete the entry AND the
# annotation from the source code.

exceptions:
  # ── cast.rs: Safe macro infrastructure ──────────────────────────

  - path: "crates/cp-base/src/cast.rs"
    match: '#![expect('
    reason: >
      Module-level expect for clippy::allow_attributes. The Safe
      macros expand #[allow(...)] for different types — some lint triggers
      are type-dependent, so #[expect] (which requires the lint to fire)
      would produce unfulfilled-expectation errors on certain expansions.
    strategy: >
      Wait for Rust RFC to support conditional #[expect] per type
      parameter, or replace macros with a build.rs code generator that
      emits per-type impls with precise annotations.

  - path: "crates/cp-base/src/cast.rs"
    match: 'trivial_numeric_casts, trivial_casts, clippy::cast_lossless, clippy::cast_possible_truncation, clippy::cast_sign_loss, clippy::cast_possible_wrap, clippy::cast_precision_loss, reason = "macro-generated identity casts'
    reason: >
      Unsigned Safe macro impl. Raw `as` casts are the whole point of
      this module — it centralizes all numeric casts behind saturating
      wrappers so the rest of the codebase never uses raw `as`.
    strategy: >
      Replace macros with a proc-macro or build.rs that generates
      per-type impls, each with only the #[allow] lints that actually
      trigger for that specific source/target pair.

  - path: "crates/cp-base/src/cast.rs"
    match: 'reason = "macro-generated identity casts are unavoidable'
    reason: >
      Signed Safe macro impl. Same rationale as the unsigned variant —
      macro-generated identity casts are unavoidable with the current
      approach.
    strategy: >
      Same as above — proc-macro or build.rs per-type generation.

  - path: "crates/cp-base/src/cast.rs"
    match: 'f64 Safe impl: saturating casts necessarily use raw'
    reason: >
      Concrete f64 Safe impl. Only cast_possible_truncation and
      cast_sign_loss fire — reduced from 5 lints in the old #[allow].
      Uses #[expect] (compiler-verified) instead of #[allow].
    strategy: >
      No further reduction — truncation and sign_loss are inherent
      to f64→integer casts. Identity to_f64 triggers nothing.

  - path: "crates/cp-base/src/cast.rs"
    match: 'f32 Safe impl: saturating casts necessarily use raw'
    reason: >
      Concrete f32 Safe impl. Same as f64 — only truncation and
      sign_loss fire. Uses #[expect] instead of #[allow].
    strategy: >
      No further reduction — same as f64.

  # ── config/mod.rs: invariant_panic ──────────────────────────────────

  - path: "crates/cp-base/src/config/mod.rs"
    match: '#[expect(clippy::panic'
    reason: >
      invariant_panic() is the centralized panic point for build-time and
      config invariant violations (YAML not found, theme not loaded, module
      state not initialized). These are unrecoverable programmer errors,
      not runtime failures.
    strategy: >
      Consider compile-time validation (const fn / build.rs assertions)
      for YAML and theme invariants. For module state, explore a type-state
      pattern where uninitialized state is unrepresentable.

  # ── compiler.rs: chrono timezone arithmetic ────────────────────────

  - path: "crates/cp-mod-typst/src/compiler.rs"
    match: 'chrono offset arithmetic cannot overflow'
    reason: >
      Adding a timezone offset (±12h) to a UTC datetime. chrono::Duration
      arithmetic cannot overflow for valid timezone offsets.
    strategy: >
      Irreducible — chrono's Add impl requires the caller to handle the
      arithmetic lint. The offset range (±12h) is always safe.

  # ── panels.rs: time_arith module ────────────────────────────────────

  - path: "crates/cp-base/src/panels.rs"
    match: 'sole choke-point for truncating time/division arithmetic'
    reason: >
      Centralized time/division arithmetic module: ms_to_secs(),
      secs_to_hms(), secs_to_hms_unwrapped(), div_const(). All
      truncating integer division is funneled here so no other file
      triggers integer_division_remainder_used or arithmetic_side_effects
      for division.
    strategy: >
      Fundamentally irreducible — integer truncation IS the desired
      behavior for millisecond-to-second conversion and const-divisor
      helpers. No alternative representation avoids it.

  # ── module_name_repetitions: names that include their module ────────
  # Types used via re-export where the shorter name conflicts with
  # common identifiers (reserved words, std types, or sibling types).

  # ── ui/helpers.rs: spinner modulo ────────────────────────────────────

  - path: "src/ui/helpers.rs"
    match: 'modulo for cyclic spinner index is the algorithm'
    reason: >
      spinner() uses frame_counter % SPINNER_BRAILLE.len() to cycle
      through animation frames. Modulo IS the algorithm.
    strategy: >
      Irreducible — cyclic indexing requires modulo.

  # ── ui/perf/mod.rs: ring buffer modulo ──────────────────────────────

  - path: "src/ui/perf/mod.rs"
    match: 'ring buffer push: modulo for cyclic index wrap'
    reason: >
      RingBuffer::push() uses modulo to wrap write_pos around
      the fixed-size ring. Modulo IS the algorithm.
    strategy: >
      Irreducible — ring buffer cycling requires modulo.

  - path: "src/ui/perf/mod.rs"
    match: 'ring buffer recent: modulo for cyclic index wrap'
    reason: >
      RingBuffer::recent() uses modulo to wrap read indices around
      the fixed-size ring. Modulo IS the algorithm.
    strategy: >
      Irreducible — ring buffer cycling requires modulo.

  # ── ui/help/config_overlay.rs: token formatting division ────────────

  - path: "src/ui/help/config_overlay.rs"
    match: 'format_tokens_compact: truncating division for human-readable K/M token display'
    reason: >
      format_tokens_compact() divides token counts by 1,000 or 1,000,000
      for human-readable K/M display. Truncating integer division IS
      the desired behavior.
    strategy: >
      Irreducible — integer truncation is the desired behavior for
      compact token count display.

  # ── conversation/list.rs: base-26 encoding ────────────────────────

  - path: "src/modules/conversation/list.rs"
    match: 'base-26 encoding requires modulo and division'
    reason: >
      alpha_from_number() converts a numeric index to alphabetic labels
      (a, b, ..., z, aa, ab, ...) using modulo and division for base-26
      encoding. Modulo IS the algorithm.
    strategy: >
      Irreducible — base-26 encoding inherently requires modulo
      and division.

  # ── app/run/*: multiple_inherent_impl for App ─────────────────────────

  - path: "src/app/run/lifecycle.rs"
    match: 'App methods split across run/ submodules for readability'
    reason: >
      App methods are split across 7 submodules in src/app/run/ for
      readability. Each file contributes an impl App block covering a
      distinct concern (input, lifecycle, streaming, etc.). The lint
      fires on all impl blocks except the first (input.rs).
    strategy: >
      Could merge all impl blocks into a single file, but that would
      create a 2500+ line file. The split is intentional for navigation.

  - path: "src/app/run/reverie.rs"
    match: 'App methods split across run/ submodules for readability'
    reason: >
      See src/app/run/input.rs entry.
    strategy: >
      Same as input.rs.

  - path: "src/app/run/streaming.rs"
    match: 'App methods split across run/ submodules for readability'
    reason: >
      See src/app/run/input.rs entry.
    strategy: >
      Same as input.rs.

  - path: "src/app/run/tool_cleanup.rs"
    match: 'App methods split across run/ submodules for readability'
    reason: >
      See src/app/run/input.rs entry.
    strategy: >
      Same as input.rs.

  - path: "src/app/run/tool_pipeline.rs"
    match: 'App methods split across run/ submodules for readability'
    reason: >
      See src/app/run/input.rs entry.
    strategy: >
      Same as input.rs.

  - path: "src/app/run/watchers.rs"
    match: 'App methods split across run/ submodules for readability'
    reason: >
      See src/app/run/input.rs entry.
    strategy: >
      Same as input.rs.

  - path: "src/llms/mod.rs"
    match: 'std::error::Error: provide/type_id/cause are unstable or deprecated'
    reason: >
      impl Error for LlmError implements source() and description().
      provide(), type_id(), and cause() are either unstable or deprecated
      and cannot be meaningfully implemented.
    strategy: >
      Irreducible — the remaining unimplemented methods are either
      unstable (provide) or deprecated (cause).


  last_edited_ms: 1783502152326
ts-contract:
  name: ts-contract
  description: Regenerate TypeScript client from openapi.json on TS file edits to catch contract drift
  pattern: web/src/**/*.ts
  blocking: true
  timeout_secs: 30
  success_message: TS contract OK ✓
  is_global: true
  script_content: |-
    cd web
    # Config-driven codegen: web/openapi-ts.config.ts emits the @ts-nocheck
    # generated-bindings header natively via output.header (web-lint P1), so there
    # is no post-codegen stamping step — the committed tree is byte-identical to a
    # fresh config-driven run and the drift check is a clean regenerate + diff.
    npx @hey-api/openapi-ts -f openapi-ts.config.ts 2>&1

    # Check for drift in tracked generated files (-- separates paths from revisions)
    if ! git diff --exit-code --quiet -- web/src/lib/api/generated/ 2>/dev/null; then
      echo "::error::Generated TypeScript client drifted from openapi.json!"
      echo "Do not hand-edit generated files."
      git diff --stat -- web/src/lib/api/generated/
      exit 1
    fi
  last_edited_ms: 1783418815248

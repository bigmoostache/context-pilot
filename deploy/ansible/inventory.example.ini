# Example inventory for the Context Pilot appliance fleet.
# Copy to inventory.ini and edit. `ansible_host` is the box LAN IP (also used on
# the printed delivery sheet's maintenance URL).
#
#   ansible-playbook -i inventory.ini deploy/ansible/provision-seed.yml

[appliances]
pilot-01 ansible_host=192.168.1.116 ansible_user=root

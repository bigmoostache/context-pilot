---
# Ship binaries + web + systemd units + Caddyfile to an Armbian/Debian 13 box.
# Does NOT start anything — services start after the seed (tasks/start.yml), so
# the admin is seeded from seed.env on first boot. Idempotent.
#
# cp_root lives under /opt (the Debian rootfs is the whole disk). No port/firewall
# juggling is needed: a stock Armbian box has nothing fighting for :80/:443 and no
# default REJECT zone — only :22 listens on a fresh box.
#
# The binaries + SPA come from the flat release bundle (fetch.yml extracts it on
# the control node into {{ artifacts_dir }}/bundle): cpilot, cp-console-server,
# cp-orchestrator, web/<spa>. The systemd units + bootstrap Caddyfile come from
# the repo (templates/ + deploy/photonicat/Caddyfile), not the release.

- name: Stop services if already present (factory box won't have them)
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    state: stopped
  loop:
    - context-pilot
    - caddy
  failed_when: false

- name: Create the data tree
  ansible.builtin.file:
    path: "{{ cp_root }}/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - bin
    - home
    - web
    - caddy

- name: Ship the binaries (orchestrator + agent + Caddy) from the flat release bundle
  # The release bundle is flat (cpilot, cp-console-server, cp-orchestrator, web/);
  # the agent binary is named `cpilot` there but the box + unit expect `bin/tui`,
  # so the mapping is explicit rather than by basename.
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ cp_root }}/bin/{{ item.dst }}"
    mode: "0755"
  loop:
    - { src: "{{ artifacts_dir }}/bundle/cp-orchestrator", dst: cp-orchestrator }
    - { src: "{{ artifacts_dir }}/bundle/cpilot", dst: tui }
    - { src: "{{ artifacts_dir }}/caddy", dst: caddy }

- name: Ship the SPA bundle (from the release bundle)
  ansible.builtin.copy:
    src: "{{ artifacts_dir }}/bundle/web/"
    dest: "{{ cp_root }}/web/"
    mode: "0644"
    directory_mode: "0755"

- name: Install the systemd units (templated with cp_root)
  ansible.builtin.template:
    src: "{{ playbook_dir }}/templates/{{ item }}.service.j2"
    dest: "/etc/systemd/system/{{ item }}.service"
    mode: "0644"
  loop:
    - context-pilot
    - caddy

- name: Install the bootstrap Caddyfile (the orchestrator regenerates it at boot)
  ansible.builtin.copy:
    src: "{{ repo_root }}/deploy/photonicat/Caddyfile"
    dest: "{{ cp_root }}/caddy/Caddyfile"
    mode: "0644"

- name: Reload systemd so it picks up the new/updated units
  ansible.builtin.systemd_service:
    daemon_reload: true

---
# Enable + start the services (after the seed) and verify they answer. The
# orchestrator starts first (START=95) — it seeds the admin from seed.env and
# writes the Caddyfile — then Caddy (START=96) serves it.

- name: Enable the procd services
  ansible.builtin.command: "/etc/init.d/{{ item }} enable"
  loop:
    - context-pilot
    - caddy
  changed_when: true

- name: (Re)start the orchestrator
  ansible.builtin.command: /etc/init.d/context-pilot restart
  changed_when: true

- name: Wait for the product API to answer
  ansible.builtin.uri:
    url: http://127.0.0.1:7878/api/health
    status_code: 200
  register: health
  retries: 10
  delay: 1
  until: health.status == 200

- name: (Re)start Caddy (now that the orchestrator wrote the Caddyfile)
  ansible.builtin.command: /etc/init.d/caddy restart
  changed_when: true

- name: Wait for the maintenance plane to answer (via the orchestrator loopback)
  ansible.builtin.uri:
    url: http://127.0.0.1:9191/api/maint/status
    status_code: 200
  register: maint
  retries: 10
  delay: 1
  until: maint.status == 200

- name: Report readiness
  ansible.builtin.debug:
    msg: >-
      {{ inventory_hostname }} ready — maintenance console at
      https://{{ ansible_host | default(inventory_hostname) }}:9090
      (provisioned={{ (maint.json.provisioned | default(false)) }}).

tools:
  Send:
    description: |
      Posts a message to a thread. The AI uses this to respond to thread messages.
      At least one of markdown or file_path must be provided.
      After sending, the thread becomes THEIR_TURN (waiting for the user) and
      focus is cleared, starting a dangling phase of 5 tool calls before the AI
      must focus on another MY_TURN thread.

      PRESENTING A FILE TO THE USER:
      To show the user a clickable file card (which opens a rich preview ‚Äî
      image / PDF / spreadsheet / code / markdown ‚Äî in a drawer), embed a
      ```file-upload``` fenced block inside your `markdown`, at the exact spot
      you want the card to appear (it renders inline, interleaved with your
      prose). The frontend parses every such block and replaces it with the
      card; you can include several blocks (one card each) in one message.

      Format (YAML body under a `file:` key):

        ```file-upload
        file:
          path: relative/path/within/the/realm.pdf
          name: report.pdf
          size: 48213
          note: generated by the build step
        ```

      Fields: `path` (REQUIRED ‚Äî realm-relative path to an EXISTING file; the
      card greys out with a "file not found" warning if it doesn't exist),
      `name` (optional display name, defaults to the path's basename), `size`
      (optional bytes, for the size label), `note` (optional one-line caption).
      Only reference files that actually exist in the agent's folder ‚Äî e.g. one
      you just wrote, or an upload under `.uploads/`.

      ASKING THE USER A STRUCTURED QUESTION (```form``` block):
      To ask the user structured questions ‚Äî a single/multi choice, a
      confirmation before a destructive action, a date, a file upload, free
      text ‚Äî embed a ```form``` fenced block inside your `markdown`, at the exact
      spot you want the form to appear (it renders inline as an interactive
      widget, like a file card). You may include several form blocks in one
      message. Author the form ONCE; you never track its status ‚Äî the frontend
      derives "answered" from a matching ```form-answer``` message the user's
      submit creates, and you read that block to learn the answers.

      Format (YAML body). Pick a `form-id` that is UNIQUE WITHIN THE THREAD
      (a short slug or UUID):

        ```form
        form-id: deploy-v0-3-0
        title: Deploy release v0.3.0
        submit: Confirm
        fields:
          - id: target
            label: Which machine?
            type: single
            allow-other: true
            options:
              - label: gilbert
                detail: Mac Mini arm64, prod
              - label: asterix
                detail: server x86_64, staging
          - id: agents
            label: Which agents to restart?
            type: multi
            options:
              - label: opio-1
                detail: main agent
              - label: general-config
                detail: config agent
          - id: note
            label: Deploy note
            type: text
          - id: count
            label: Max attempts
            type: number
          - id: when
            label: Deploy date
            type: date
          - id: dry-run
            label: Dry-run mode
            type: toggle
          - id: artifacts
            label: Attach build logs
            type: files
          - id: go
            label: Confirm production deploy
            type: confirm
            confirm-word: DEPLOY
        ```

      Global keys: `form-id` (REQUIRED, thread-unique), `title` (optional),
      `submit` (optional button label), `fields` (REQUIRED, ordered list).
      Every field has `id` (unique in the form) + `label` + `type`. ALL fields
      are mandatory for the user ‚Äî there is no "required" flag.

      Field `type` values (v1):
        single  ‚Äî radio choice; `options` list of {label, detail}. Add
                  `allow-other: true` for a free-text "Other‚Ä¶" choice.
        multi   ‚Äî checkbox choice; `options` list of {label, detail}.
        text    ‚Äî free text.
        number  ‚Äî numeric.
        date    ‚Äî date picker (answer is ISO YYYY-MM-DD).
        toggle  ‚Äî neutral on/off boolean switch.
        confirm ‚Äî danger-accented button for destructive confirmations;
                  optional `confirm-word` the user must type to arm it.
        files   ‚Äî the user answers by uploading file(s); the answer is a list
                  of realm-relative paths.

      When the user submits, a user message carrying a ```form-answer``` block
      (same `form-id`, an `answers` list of {id, answer}) appears in the thread.
      Read it to learn the choices (scalar for single/text/number/date/toggle/
      confirm; list for multi/files). A malformed ```form``` block (missing
      `form-id` or `fields`) is rejected ‚Äî the Send fails with an error.

      MATH RENDERING:
      Single `$` is treated as a literal dollar sign (NOT inline math).
      For LaTeX math, use `$$...$$` (display block) or `\(...\)` (inline).
    parameters:
      thread_id: "Thread ID to post to (e.g., 'T1')"
      markdown: "Markdown text content for the message (may embed ```file-upload``` and ```form``` blocks)"
      file_path: "File path to attach as a reference"
      still_my_turn: "If true (default), the thread stays yours after sending ‚Äî use for progress updates. Set false when you're done and want to hand the thread back to the user (flips to THEIR_TURN)."

  Read:
    description: |
      Reads a thread and sets focus. If the thread is MY_TURN,
      reading it sets focus ‚Äî the AI is now working on this thread. If the
      thread is THEIR_TURN, it's a peek (no focus change).
      Marks all messages as acknowledged and populates the Threads panel with
      the thread's recent conversation (most recent messages).
    parameters:
      thread_id: "Thread ID to read (e.g., 'T1')"

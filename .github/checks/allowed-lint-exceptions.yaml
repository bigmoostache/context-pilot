# Curated list of allowed #[expect(...)] and #[allow(...)] annotations.
#
# Every occurrence in the codebase MUST have an entry here, or the
# structure-check will fire an ERROR. This keeps lint suppression
# intentional, visible, and continuously reviewed.
#
# Fields:
#   path          — file path relative to repo root
#   match         — exact string that appears on the annotation line(s)
#   reason        — why this exception is currently accepted
#   strategy      — ideas to eventually eliminate it
#
# To add a new exception: append an entry, run the structure-check,
# and ensure it passes. To remove one: delete the entry AND the
# annotation from the source code.

exceptions:
  # ── deref_match! macro: sole ref-pattern chokepoint ─────────────────

  - path: "crates/cp-base/src/lib.rs"
    match: "clippy::pattern_type_mismatch mandates ref bindings when destructuring non-Copy fields out of a shared reference; the two restriction lints are mutually exclusive, so the deref-plus-ref form is funneled through this one macro"
    reason: >
      The deref_match! macro is the single audited site allowed to use `ref`
      bindings. clippy::pattern_type_mismatch (forbid) rejects matching a variant
      pattern against a &Enum via match ergonomics; its mandated fix is to
      dereference the scrutinee (match *place) and bind non-Copy fields with ref.
      But clippy::ref_patterns rejects ref. The two restriction lints are mutually
      exclusive for destructuring a non-Copy field out of a shared reference, so
      every such site (Display/Debug/Error impls with String/Box/Vec fields)
      routes through this macro — the single #[expect(clippy::ref_patterns)]
      covers all expansions workspace-wide.
    strategy: >
      Irreducible — the two forbid-level restriction lints are mutually exclusive
      by design; a single chokepoint macro is the minimal honest resolution.

  - path: "crates/cp-vault/src/types.rs"
    match: "cp-vault is foundational (cannot depend on cp-base's deref_match! macro)"
    reason: >
      VaultError's Display impl matches *self and binds the non-Copy String
      payloads (MissingKey/Io/Network) with ref. clippy::pattern_type_mismatch
      (forbid) mandates the deref-plus-ref form; clippy::ref_patterns is mutually
      exclusive with it. cp-vault sits below cp-base in the crate graph and cannot
      use the deref_match! macro, so the fmt fn carries its own #[expect].
    strategy: >
      Irreducible — the two restriction lints are mutually exclusive and this
      foundational crate cannot reach the shared macro chokepoint.

  - path: "crates/cp-wire/src/framing.rs"
    match: "cp-wire is foundational (cannot depend on cp-base's deref_match! macro)"
    reason: >
      FrameError's Display impl matches *self and binds the non-Copy String
      payloads (DeserializeError/SerializeError) with ref. clippy::pattern_type_mismatch
      (forbid) mandates the deref-plus-ref form; clippy::ref_patterns is mutually
      exclusive with it. cp-wire sits below cp-base in the crate graph and cannot
      use the deref_match! macro, so the fmt fn carries its own #[expect].
    strategy: >
      Irreducible — the two restriction lints are mutually exclusive and this
      foundational crate cannot reach the shared macro chokepoint.

  - path: "crates/cp-oplog/src/lib.rs"
    match: "cp-oplog is foundational (only cp_wire + std); clippy::pattern_type_mismatch mandates explicit &-patterns with ref bindings for a read-only match over a borrowed enum and the two restriction lints are mutually exclusive, so every such site funnels through this one local macro"
    reason: >
      The ref_match! macro is cp-oplog's local ref-pattern chokepoint. Its sites
      (Error Display, replay fold_entry, replay_fast Checkpoint) all read non-Copy
      fields (io::Error/FrameError/Snapshot/thread_id) out of a borrowed enum;
      clippy::pattern_type_mismatch (forbid) mandates explicit &-patterns with ref
      bindings, and clippy::ref_patterns is mutually exclusive with it. cp-oplog
      depends only on cp_wire + std and cannot reach cp-base's deref_match!, so
      every such site routes through this one macro — the single
      #[expect(clippy::ref_patterns)] covers all expansions.
    strategy: >
      Irreducible — the two restriction lints are mutually exclusive and this
      foundational crate cannot reach the shared macro chokepoint.

  # ── too_many_lines: flat aggregate root-state initializer ────────────

  - path: "crates/cp-base/src/state/runtime/default.rs"
    match: "flat aggregate root-state initializer; sub-grouping fields would churn 136 access sites for no gain"
    reason: >
      State is the flat aggregate root of the whole application (~80 leaf fields:
      UI cursors, id counters, model selections, cache/stream/tick token + USD
      telemetry, panel-diff snapshots, per-frame caches). Its Default impl is a
      single linear struct literal — one `field: value` line each — at 82 lines
      over the 60-line threshold. Grouping the telemetry counters into sub-structs
      to shave lines would ripple across 136 field-access sites for zero
      behavioural gain, so the initializer stays flat and carries the length
      expect. Threshold is unchanged (still 60).
    strategy: >
      Irreducible without a 136-site sub-struct refactor that trades a linear
      initializer for cross-cutting churn; the flat literal is the honest shape.

  # ── cast.rs: Safe numeric casting infrastructure ─────────────────

  - path: "crates/cp-base/src/cast/mod.rs"
    match: "lossy int→float: mantissa too narrow — inherent floating-point limitation"
    reason: >
      Module-level #[expect] on mod lossy_float covers all 12 lossy
      int→float casts (u32/u64/u128/usize/i32/i64/isize → f32/f64).
      Mantissa width (24-bit f32, 53-bit f64) fundamentally cannot
      represent all values of wider integer types.
    strategy: >
      Irreducible — fundamental floating-point limitation.

  - path: "crates/cp-base/src/cast/mod.rs"
    match: "saturating float→int: no TryFrom<float> for integers in std"
    reason: >
      Module-level #[expect] on mod float_to_int covers f64 and f32
      Safe impls. No TryFrom<f64/f32> for integer types exists in std,
      so raw `as` with manual bounds checking is the only path.
    strategy: >
      Irreducible until std provides TryFrom<f64> for integers.

  - path: "crates/cp-base/src/cast/float_math.rs"
    match: "sole chokepoint for irreducible f32/f64 arithmetic — token/char/page conversion, USD cost, bar fills, easing, and telemetry statistics"
    reason: >
      Module-level #![expect] on mod float_math: the sole audited site for
      float arithmetic once clippy::float_arithmetic is deny workspace-wide.
      Domain-named helpers (token/char/page conversion, USD cost, bar fills,
      easing curves, telemetry statistics) carry no domain constants —
      divisors/factors are parameters. The arithmetic is irreducible —
      floating-point IS the domain (ratios, prices, decay).
    strategy: >
      Fundamentally irreducible — float ratio/price/decay math has no integer
      equivalent. Chokepoint mirrors the time_arith integer-division module.

  - path: "src/app/actions/mod.rs"
    match: "exhaustive dispatch over ~70 Action variants; splitting requires either a forbidden wildcard catch-all (wildcard_enum_match_arm) or a duplicated giant or-pattern, both worse than one flat variant→handler table — the dispatch twin of the flat State::default initializer"
    reason: >
      apply_action is a single flat match over the closed ~70-variant Action enum
      (the Elm/Redux update loop). Every arm is a one-line delegation to a handler.
      Splitting the match across sub-dispatchers is impossible under the 60-line cap:
      Rust requires each match to be exhaustive, and a _/bare-binding catch-all trips
      clippy::wildcard_enum_match_arm (forbid); a pass-back Result chain needs the same
      catch-all; borrowing the scrutinee (match &action) to split by payload trips
      clippy::pattern_type_mismatch. The only residual is length, intrinsic to a
      70-action enum, so the fn carries one #[expect(clippy::too_many_lines)] — the
      dispatch twin of the State::default flat-initializer expect. Threshold unchanged (60).
    strategy: >
      Irreducible — a closed 70-variant dispatch cannot be split under the line cap
      without a forbidden wildcard catch-all; the flat delegating match is the honest shape.

  # ── config/mod.rs: invariant_panic ──────────────────────────────────

  - path: "crates/cp-base/src/config/mod.rs"
    match: 'invariant violation is unrecoverable — validated by tests::all_embedded_yaml_parses_successfully'
    reason: >
      invariant_panic() is the centralized panic point for build-time and
      config invariant violations (YAML not found, theme not loaded, module
      state not initialized). These are unrecoverable programmer errors,
      not runtime failures. Provably unreachable: tests::all_embedded_yaml_parses_successfully
      validates every embedded YAML schema on every cargo test run.
    strategy: >
      Already at minimum — single centralized panic function with
      compile-time validation. Could add build.rs validation for
      zero-test-dependency assurance when stable const deserialization lands.

  # ── panels.rs: time_arith module ────────────────────────────────────

  - path: "crates/cp-base/src/panels.rs"
    match: 'sole choke-point for truncating time/division arithmetic'
    reason: >
      Centralized time/division arithmetic module: ms_to_secs(),
      secs_to_hms(), secs_to_hms_unwrapped(), div_const(). All
      truncating integer division is funneled here so no other file
      triggers integer_division_remainder_used or arithmetic_side_effects
      for division.
    strategy: >
      Fundamentally irreducible — integer truncation IS the desired
      behavior for millisecond-to-second conversion and const-divisor
      helpers. No alternative representation avoids it.


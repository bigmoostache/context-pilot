986adb56b40b2b32:
  tl_dr: 'OPS & BUILD GOTCHAS (consolidated): orchestrator restart vs system_reload, port-freeing, git/pnpm/lint quirks, never-commit list. Full list in contents.'
  contents: |-
    ## Build / deploy decision
    - **TUI-crate change** (src/, cp-mod-*, cp-base, cp-render, cp-oplog, cp-wire, cp-mod-bridge) → `cargo build --release` + `system_reload`. NOT an orchestrator restart.
    - **Backend-crate change** (cp-orchestrator) → `cargo build -p cp-orchestrator` + RESTART the orchestrator. NOT system_reload. The running backend binary goes stale independently of the TUI; a route added after launch returns 502 until restart.
    - **Frontend change** (web/) → nothing; vite dev (:5174) hot-reloads. Run `npm run build` (tsc+vite) only to verify.
    - **Agent restart** via POST /api/agent/{id}/restart respawns on target/release/tui — rebuild RELEASE first; confirm pid CHANGES (a running process keeps old code after rebuild-in-place).

    ## Orchestrator port (:7878)
    - Launched via console `sh -c '… ./target/debug/cp-orchestrator'`. Killing ONLY the orchestrator pid → the sh parent respawns it. To free :7878 kill BOTH the orchestrator pid AND its `sh -c` parent (lsof -ti:7878 finds the child; also pkill the sh). Relaunch debug with CP_COST_BUDGET=100000000.

    ## git
    - NEVER run git via console_easy_bash (blocked on the 'git' substring) — use git_execute.
    - Stale index.lock after a broken commit: `rm -f .git/index.lock`.
    - git_execute handles multi-line `-m` fine.
    - **Untracked NOT-mine, NEVER commit**: .cp-trash/, .uploads/, report/*, .context-pilot/shared/entities/. Stage own files explicitly.

    ## web/ is PNPM
    - Use `pnpm add` for deps. `npm install` CRASHES on pnpm symlinks (@npmcli/arborist 'Cannot read properties of null'). `npm run <script>` is fine (just runs vite).

    ## Rust lint / test
    - `unused-crate-dependencies` is forbid PER-TARGET. A lib-only dep (e.g. calamine/csv/portable_pty in cp-orchestrator) needs `use <crate> as _;` in main.rs's bin target or the bin fails.
    - CB3 rust-check is LIB-ONLY → always `cargo build -p <crate>` (full, incl bin) + `cargo test -p <crate>` before declaring backend green.
    - folder-sizes callback 'failure' on ./oplog/bodies = a gitignored runtime artifact — unrelated, ignore.
    - lint-integrity exit -1 = known benign chain quirk.

    ## Misc debugging
    - FileLogger (src/main.rs) only logs targets starting with `cp_base` — log::info! in the `tui` crate is FILTERED OUT of state-machine.log.
    - A bridge command 'accepted' (rev) means journal-then-ack succeeded; it is NOT proof the apply mutation succeeded (apply_* can early-return on a serde failure).
    - UnixStream::pair() shutdown(Write) does NOT reliably give the peer EOF; read exactly N acks then drop the stream (real connect/accept UDS propagate EOF fine).
  importance: critical
  labels:
  - workflow
  - gotchas
  - build
  - deploy
  - git
  last_edited_ms: 1782045983303
bc38d2fd0bcf015a:
  tl_dr: 'UnixStream::pair() test hang: shutdown(Write) does NOT reliably give the peer EOF — server blocked on read-until-EOF hangs. FIX: read exactly N acks then drop(client) for real EOF.'
  contents: |-
    Phase 26 bug: two cp-mod-bridge integration tests hung >60s. Root cause: Intake::handle_connection reads the socket until EOF; the test writer called client.shutdown(Shutdown::Write) expecting the server's read to return 0, but shutdown(Write) on a UnixStream::pair() (socketpair) end does NOT reliably propagate EOF to the peer. Server blocked forever.

    FIX: replace drain-until-EOF with read_acks(stream, expected: usize) that reads EXACTLY the expected count of framed acks, then the writer thread ends and drop(client) closes the fd → peer gets a real EOF → handle_connection returns. This mirrors the proven inline handle_connection test. RULE: never rely on shutdown(Write)→peer-EOF for socketpairs; close/drop the whole stream instead.
  importance: high
  labels:
  - rust
  - unix-socket
  - testing
  - gotcha
  - bridge
  last_edited_ms: 1781649648561
caf6de1cb65ac661:
  tl_dr: 'DEMAQUETTING (final frontend-wiring sequence, branch ''demaquetting''): wire live frontend↔backend, keep ui/ maquette FROZEN as reference, build live app in sibling web/ dir. Full plan in contents.'
  contents: |-
    ## DEMAQUETTING — captain's final sequence (T36)

    Goal: EVERYTHING working — frontend wired, active, performant. DO NOT touch ui/ (frozen maquette reference for comparison). Build live app in sibling `web/` dir.

    ## Locked architecture — TWO PLANES (Philosophy B)
    1. **Orchestration plane (durable, EXISTS)**: oplog → AgentView + SSE deltas (liveness, commands exactly-once, cost breaker, stream hints).
    2. **Inspection plane (read-only, NEW)**: backend reads agent's tier-② state files (as specified in design doc v7 three-tier model) → reshapes to maquette JSON. NO agent writes, NO oplog bloat. Matches original T31 'disk-as-truth(read)' pillar.

    ## Agent state layout (tier-② files, per design doc v7)
    - `<folder>/.context-pilot/config.json` → `modules` map = GLOBAL (is_global) module data: `threads` (full thread list+message logs), `memory`, `tree`, `logs`. Also active_theme, view_mode. (~386KB; mtime memo-cache.)
    - `<folder>/.context-pilot/states/<worker>.json` → `modules` map = PER-WORKER data: todo, queue, scratchpad, spine, callback_worker, tree_worker, threads_worker(=FocusState only), git, console, cache_engine, search, core_worker, questions_worker. Plus important_panel_uids, panel_uid_to_local_id, cost.
    - `shared/{memories.yaml, callbacks.yaml, tree-descriptions.yaml, entities/entities.db}`.
    - `messages/*.yaml` (conversation msgs), `panels/*.json`.
    Save path: cp-base save.rs build_save_batch → global module data into config.json SharedConfig.modules; per-worker into states/<worker>.json modules (with _worker suffix for worker_data).

    ## 18-phase plan (4 workstreams)
    W1 Backend runtime: P1 orchestrator runtime loop (runtime.rs: AgentRegistry+per-agent Tailer+MaterializedView+CostBreaker+StreamHub bg thread folds oplog→view+feeds hub; serve() on port default 7878; main.rs starts runtime; CORS for vite :5174; /api/health; graceful shutdown).
    W2 Inspection REST (read tier-② files→JSON): P2 inspect/ state reader core (locate folder from Entry.folder, read config.json+states+shared, mtime memo-cache). P3 threads endpoints GET /api/agent/{id}/threads (ThreadDetail{log:ThreadMsg[]} from config.json modules.threads). P4 cockpit panels: /panels + /memory /todos /spine /queue /scratchpad /entities /tree /callbacks /tools /radar. P5 agent meta + fleet enrichment (name=folder basename, branch via git -C, model from Entry, status from phase/liveness, cost from worker, task, threads count, lastActivity). P6 finder fs (GET /fs?path= confined dir listing→FinderNode[]) + conversation (messages/). P7 usage + library.
    W3 Bridge activation (gated CP_BRIDGE=1, additive): P8 bridge boot wiring (Boot::start_in writes registry/heartbeat/oplog/socket on TUI boot, Drop cleanup). P9 heartbeat Beacon + stream tee at streaming.rs. P10 command intake+application via actions/input.rs user-message path (K7): SendMessage→inject user msg into thread; CreateThread/Archive/Restore→threads module; Stop/Interrupt.
    W4 Web client: P11 scaffold web/ (copy ui/, dev port 5174, lib/api.ts REST+ticket mint, lib/sse.ts EventSource+Last-Event-ID+resync, lib/live.ts hooks useFleet/useAgent/useThreads/usePanels SWR-style fetch+SSE-invalidate+poll fallback; mock.ts kept as fallback). P12 fleet live. P13 threads live (composer→real input→POST SendMessage; NewThreadDialog→CreateThread; archive→ArchiveThread; QuestionForm submit→answer; SSE new messages). P14 cockpit live. P15 finder live. P16 TopBar/Config/Usage/Prompts live.
    W5 Integration+perf+ship: P17 e2e demo (orchestrator + bridge-ON TUI + web together) + perf (SSE-invalidate, debounce, shadcn skeletons). P18 run-stack.sh + README + docs, commit/push.

    ## Sequencing: W1→W2→W4 first (frontend live fast against tier-② files, even hand-registered agent), then W3 (live self-registering agent), then W5. W3 highest risk (touches running TUI) — additive+gated.
    ## Notes: web dir = web/. CORS allow localhost. perf = SSE push invalidates query + 2-3s poll backstop. X787 (Phase 20 M4 ship gate) deferred until after demaquetting.
  importance: critical

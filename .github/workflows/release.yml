name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # Pin Rust 1.95.0 — matches local dev. The workspace lint config forbids
    # several lints that only exist in Rust 1.94+, so the toolchain must be
    # >= 1.94. (The former 1.93.0 pin for matrix-sdk is obsolete — that
    # dependency was removed.)
    - name: Install Rust 1.95.0
      run: |
        rustup toolchain install 1.95.0 --profile minimal
        rustup default 1.95.0

    - name: Build release binaries
      run: |
        cargo build --release
        cargo build --release -p cp-console-server

    - name: Extract version
      id: version
      run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

    - name: Build .deb package
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        PKG="cpilot_${VERSION}_amd64"
        mkdir -p "${PKG}/DEBIAN"
        mkdir -p "${PKG}/usr/local/bin"

        # Copy binaries
        cp target/release/tui "${PKG}/usr/local/bin/cpilot"
        cp target/release/cp-console-server "${PKG}/usr/local/bin/cp-console-server"
        chmod 755 "${PKG}/usr/local/bin/cpilot"
        chmod 755 "${PKG}/usr/local/bin/cp-console-server"

        # Control file
        cat > "${PKG}/DEBIAN/control" << EOF
        Package: cpilot
        Version: ${VERSION}
        Section: devel
        Priority: optional
        Architecture: amd64
        Maintainer: Context Pilot <hello@contextpilot.dev>
        Description: Context Pilot — AI coding assistant TUI
         A terminal-based AI coding assistant with modular architecture,
         intermediate rendering pipeline, and multi-provider LLM support.
        EOF
        # Strip leading whitespace from heredoc (DEBIAN/control is whitespace-sensitive)
        sed -i 's/^        //' "${PKG}/DEBIAN/control"

        # Post-install: set up global gitignore
        cat > "${PKG}/DEBIAN/postinst" << 'POSTINST'
        #!/bin/bash
        set -e
        GITIGNORE_GLOBAL="$HOME/.gitignore_global"
        if [ -f "$GITIGNORE_GLOBAL" ]; then
            if ! grep -qxF ".context-pilot/" "$GITIGNORE_GLOBAL" 2>/dev/null; then
                echo ".context-pilot/" >> "$GITIGNORE_GLOBAL"
            fi
        else
            echo ".context-pilot/" > "$GITIGNORE_GLOBAL"
            git config --global core.excludesFile "$GITIGNORE_GLOBAL" 2>/dev/null || true
        fi
        POSTINST
        sed -i 's/^        //' "${PKG}/DEBIAN/postinst"
        chmod 755 "${PKG}/DEBIAN/postinst"

        dpkg-deb --build "${PKG}"

    # Bundle for the Terminal-Bench Harbor adapter (benchmarks/terminal-bench/
    # context_pilot_agent.py). The adapter's install() downloads
    # releases/latest/download/context-pilot-linux-x86_64.tar.gz and expects
    # `tui`, `cp-console-server`, and `meilisearch` at the tarball root.
    # Meilisearch is pinned to the same version as cp-mod-search's runtime
    # downloader (crates/cp-mod-search/src/meili/download.rs) so the bundled
    # binary is byte-identical to what CP would fetch itself.
    - name: Build linux-x86_64 bundle
      run: |
        MEILI_VERSION="v1.13.3"
        mkdir -p bundle
        cp target/release/tui bundle/tui
        cp target/release/cp-console-server bundle/cp-console-server
        curl -fsSL \
          "https://github.com/meilisearch/meilisearch/releases/download/${MEILI_VERSION}/meilisearch-linux-amd64" \
          -o bundle/meilisearch
        chmod 755 bundle/tui bundle/cp-console-server bundle/meilisearch
        tar -czf context-pilot-linux-x86_64.tar.gz -C bundle tui cp-console-server meilisearch

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          cpilot_*_amd64.deb
          context-pilot-linux-x86_64.tar.gz
        generate_release_notes: true
        draft: false
        prerelease: false

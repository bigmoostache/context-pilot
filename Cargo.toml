# Redundant lifetime captures in impl Trait return types
impl_trait_redundant_captures = "forbid"
# Treat all remaining warnings as errors
warnings = "forbid"

[workspace.lints.clippy]
# Performance
needless_pass_by_value = "forbid"
cloned_instead_of_copied = "forbid"
redundant_clone = "forbid"
large_enum_variant = "forbid"
# Clarity
needless_return = "forbid"
manual_let_else = "forbid"
match_wildcard_for_single_variants = "forbid"
implicit_clone = "forbid"
# Safety / correctness
cast_possible_truncation = "deny"
cast_sign_loss = "deny"
# Style consistency
enum_glob_use = "forbid"
single_match_else = "forbid"
redundant_else = "forbid"
semicolon_if_nothing_returned = "forbid"

# ============================
# Pedantic → warn
# ============================
# Detect `as` casts where the value could wrap (e.g. u32 → i32)
cast_possible_wrap = "forbid"
# Detect `as` casts that lose floating-point precision (e.g. f64 → f32)
cast_precision_loss = "deny"
# Detect pointer casts to more-aligned types
cast_ptr_alignment = "forbid"
# Suggest checked conversions (try_from) over raw `as`
checked_conversions = "forbid"
# Collapse `else { if ... }` into `else if ...`
collapsible_else_if = "forbid"
# Prefer if/else chains over match for ordered comparisons
comparison_chain = "forbid"
# Derive Copy on iterators that can be copied
copy_iterator = "forbid"
# Use Type::default() instead of Default::default()
default_trait_access = "forbid"
# Detect broken intra-doc links
doc_broken_link = "forbid"
# Detect accidental double-space linebreaks in doc comments
doc_comment_double_space_linebreaks = "forbid"
# Detect quoted links in doc comments
doc_link_with_quotes = "forbid"
# Detect unformatted markdown in doc comments
doc_markdown = "forbid"
# Detect lifetimes that could be elided
elidable_lifetime_names = "forbid"
# Detect empty enums that should be ! (never type)
empty_enums = "forbid"
# Prefer *x over x.deref()
explicit_deref_methods = "forbid"
# Prefer `for x in &collection` over `for x in collection.into_iter()`
explicit_into_iter_loop = "forbid"
# Prefer `for x in &collection` over `for x in collection.iter()`
explicit_iter_loop = "forbid"
# Prefer `find_map` over `filter_map().next()`
filter_map_next = "forbid"
# Prefer `filter_map` over `filter().map()` with Option
flat_map_option = "forbid"
# Warn on `==` comparison of floats (use approx comparison)
float_cmp = "forbid"
# Flag functions with >3 bool parameters
fn_params_excessive_bools = "forbid"
# Prefer `.collect()` over `FromIterator::from_iter()`
from_iter_instead_of_collect = "forbid"
# Prefer `if x` over `if !x { } else { }`
if_not_else = "forbid"
# Require reason on `#[ignore]` test attributes
ignore_without_reason = "forbid"
# Use `_` for ignored unit patterns in match arms
ignored_unit_patterns = "forbid"
# Prefer generic `S: BuildHasher` over concrete `HashMap`/`HashSet`
implicit_hasher = "forbid"
# Prefer consistent field ordering matching struct definition
inconsistent_struct_constructor = "forbid"
# Use slice patterns `[first, ..]` instead of `v[0]` on refutable slices
index_refutable_slice = "forbid"
# Prefer `to_string()` on `&str` over `String::from()` or `.to_owned()`
inefficient_to_string = "forbid"
# Suggest adding `iter()` method when `IntoIterator` is implemented
into_iter_without_iter = "forbid"
# Warn on items (fn, struct, etc.) defined after statements in a block
items_after_statements = "forbid"
# Prefer `.flatten()` over `.filter(Result::is_ok).map(Result::unwrap)`
iter_filter_is_ok = "forbid"
# Prefer `.flatten()` over `.filter(Option::is_some).map(Option::unwrap)`
iter_filter_is_some = "forbid"
# Iterator-returning methods should return a type named `*Iter*`
iter_not_returning_iterator = "forbid"
# Suggest adding `into_iter()` method when `iter()` is implemented
iter_without_into_iter = "forbid"
# Detect large futures that should be boxed
large_futures = "forbid"
# Detect large stack arrays that should be heap-allocated
large_stack_arrays = "forbid"
# Detect large types passed by value that should be references
large_types_passed_by_value = "forbid"
# Prefer `assert!` over `if !cond { panic!() }`
manual_assert = "forbid"
# Prefer `elapsed()` over `Instant::now() - start`
manual_instant_elapsed = "forbid"
# Prefer `matches!()` over `if let Some/Ok/Err/None`
manual_is_variant_and = "forbid"
# Prefer `String::new()` over `String::from("")` or `"".to_string()`
manual_string_new = "forbid"
# Flag functions with many single-character variable names
many_single_char_names = "forbid"
# Prefer `map_or`/`map_or_else` over `map().unwrap_or()`
map_unwrap_or = "forbid"

# ============================
# Suspicious → deny
# ============================
# Always a bug — range missing a char
almost_complete_range = "forbid"
# Arc<T> where T is not Send+Sync is always wrong
arc_with_non_send_sync = "forbid"
# Holding bad type across await is always a bug
await_holding_invalid_type = "forbid"
# Holding lock across await is always a deadlock risk
await_holding_lock = "forbid"
# RefCell borrow across await
await_holding_refcell_ref = "forbid"
# Enabling all restriction lints is always wrong
blanket_clippy_restriction_lints = "forbid"
# Casting enum constructor is always a bug
cast_enum_constructor = "forbid"
# Always undefined/wrong
cast_nan_to_int = "forbid"
# Always use correct from_raw_parts variant
cast_slice_from_raw_parts = "forbid"
# Always a bug
confusing_method_to_numeric_cast = "forbid"
# Checking emptiness of a const is always pointless
const_is_empty = "forbid"
# Cross-pointer transmute is always dangerous
crosspointer_transmute = "forbid"
# Interior mutable const is always a bug
declare_interior_mutable_const = "forbid"
# Always fix deprecated clippy cfg attrs
deprecated_clippy_cfg_attr = "forbid"
# Dropping something without Drop is always pointless
drop_non_drop = "forbid"
# Duplicate module declaration is always a bug
duplicate_mod = "forbid"
# Duplicate attributes are always a mistake
duplicated_attributes = "forbid"
# Empty doc comment is always a mistake
empty_docs = "forbid"
# Busy loop without yield is always wrong
empty_loop = "forbid"
# Float comparison without abs is always wrong
float_equality_without_abs = "forbid"
# Forgetting something without Drop is always pointless
forget_non_drop = "forbid"
# //// instead of /// is always a typo
four_forward_slashes = "forbid"
# Always a bug
from_raw_with_void_ptr = "forbid"
# Using API above your MSRV is always wrong
incompatible_msrv = "forbid"
# Open option that does nothing is always a bug
ineffective_open_options = "forbid"
# Always a bug
iter_out_of_bounds = "forbid"
# Path::join with absolute path discards the base — always a bug
join_absolute_paths = "forbid"
# Dropping a future immediately is always wrong
let_underscore_future = "forbid"
# Always use the right combinator
lines_filter_map_ok = "forbid"
# Getter returning wrong field is always a bug
misnamed_getters = "forbid"
# a += a + b instead of a += b — always a bug
misrefactored_assign_op = "forbid"
# a = b = c is always confusing/wrong in Rust
multi_assignments = "forbid"
# Mutating range bound during iteration is always a bug
mut_range_bound = "forbid"
# Interior-mutable HashMap key is always a bug
mutable_key_type = "forbid"
# Replace that does nothing is always a bug
no_effect_replace = "forbid"
# Clone impl that doesn't delegate properly
non_canonical_clone_impl = "forbid"
# PartialOrd that contradicts Ord
non_canonical_partial_ord_impl = "forbid"
# Ambiguous octal escape is always confusing
octal_escapes = "forbid"
# .ends_with(".ext") doesn't check extension — always a bug
path_ends_with_ext = "forbid"
# Doesn't grant write on all platforms — always a bug
permissions_set_readonly_false = "forbid"
# Always a constraint violation
pointers_in_nomem_asm_block = "forbid"
# Almost always a forgotten else
possible_missing_else = "forbid"
# Print inside Display/Debug impl is always wrong
print_in_format_impl = "forbid"
# vec![rc.clone(); n] clones once — always a bug
rc_clone_in_vec_init = "forbid"
# let x = x; is always pointless
redundant_locals = "forbid"
# vec![0..n] creates vec with one Range — always a bug
single_range_in_vec_init = "forbid"
# size_of_val(&ref) gives pointer size — always a bug
size_of_ref = "forbid"
# Whitespace that hides a compound assignment
suspicious_assignment_formatting = "forbid"
# Space in command arg is always wrong
suspicious_command_arg_space = "forbid"
# Malformed doc comment
suspicious_doc_comments = "forbid"
# Misleading else formatting
suspicious_else_formatting = "forbid"
# .map() used for side effects — always wrong
suspicious_map = "forbid"
# Open options that conflict
suspicious_open_options = "forbid"
# Ambiguous to_owned call
suspicious_to_owned = "forbid"
# Misleading unary op whitespace
suspicious_unary_op_formatting = "forbid"
# Swapping via raw ptr instead of safe swap
swap_ptr_to_ref = "forbid"
# Test attribute in doctest is always wrong
test_attr_in_doctest = "forbid"
# type_id() on Box<dyn T> gives Box's type_id — always a bug
type_id_on_box = "forbid"
# Infinite recursion is always a bug (clippy version)
unconditional_recursion = "forbid"
# Wrong clippy cfg
unnecessary_clippy_cfg = "forbid"
# vec![side_effect(); 0] still runs it — always a bug
zero_repeat_side_effects = "forbid"
# Not calling wait() on child process — always a bug
zombie_processes = "forbid"

# ============================
# Suspicious → warn (intentional keeps)
# ============================

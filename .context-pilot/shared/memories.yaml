979e1f9fad99acd7:
  tl_dr: 'T322 DIAGNOSIS (no code yet, awaiting captain pick A/B/C): idle auto-Read leaves the Threads panel STALE in LLM context because tempo stays true.'
  contents: |-
    ## T322 — frozen Threads panel after idle auto-Read (root cause)

    Bug: agent idle → user sends thread message → harness auto-injects Read → Threads PANEL in LLM context NOT updated (message only reachable via the injected Read tool-result — a 'hustle').

    ROOT CAUSE = `tempo`, NOT max_freezes.
    - `state.tempo` defaults true (crates/cp-base/src/state/runtime.rs:170-172, doc: 'tempo==true → ALL panels freeze unconditionally'). Set false ONLY in src/app/run/tools/pipeline.rs:366 (real tool ran) + cleanup.rs:316 (deferred watcher). prepare_stream_context resets it true every tick.
    - ThreadsPanel is STATIC (cp-mod-threads/src/panel.rs): LLM content = ThreadsState.panel_content, rebuilt ONLY by Read (execute_read, tools.rs:175-176 writes panel_content). max_freezes=3.
    - maybe_inject_auto_read (src/app/run/threads/mod.rs) calls execute_read DIRECTLY + hand-builds messages → rebuilds panel_content (fresh!) BUT never sets tempo=false (bypasses pipeline).
    - Next prepare_stream_context (src/app/context/mod.rs): cond.tempo=true → FreezeConditions::freeze_panel priority order [1 queue→Freeze, 2 TEMPO→Freeze, 3 cache_broken→Fresh, 4 freeze_count<max_freezes→Freeze, 5 Fresh] hits #2 → Freeze → restores old emitted snapshot (pre-message) → LLM sees stale panel. max_freezes never reached (tempo short-circuits before budget). mark_panels_dirty (freeze_count=u8::MAX) would ALSO be defeated by tempo (checked before budget).

    FIX OPTIONS offered on T322: A) set state.tempo=false after execute_read in maybe_inject_auto_read (narrowest, recommended); B) route injected Read through real tempo-break logic; C) panel-level force-fresh flag in freeze engine (riskiest). Awaiting captain's pick — NO code written.
  importance: high

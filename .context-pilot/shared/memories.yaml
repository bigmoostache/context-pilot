f3090cd5b6320bde:
  tl_dr: 'ARCHITECTURE: ALL logic in Rust backend. Frontend = dumb render layer, zero business logic. Backend is sole source of truth.'
  contents: |-
    Reasons:
    1. Frontend may run on completely separate VM — no OS/filesystem/env access
    2. Frontend is disposable. Backend is source of truth. One backend: Rust.
    3. No logic duplication across frontend implementations (web, mobile, etc.)
    4-7. Lower SEV exposure (repeated 4x for emphasis)

    Consequences:
    - No filesystem operations in frontend
    - No env variable management in frontend
    - No data transformation/reshaping in frontend (backend returns exactly what UI needs)
    - Frontend only renders what the backend gives it
    - Any new feature = Rust endpoint first, then thin SDK call in frontend
  importance: critical

    INVESTIGATION FINDINGS (from P36/P38/P41 searches):
    - Active behaviour = PromptState.active_agent_id (cp-mod-prompt), TUI-internal, persisted via save_module_data (serializes active_agent_id + loaded_skill_ids) to agent worker state. NOT journaled to oplog, NOT in cp-wire AgentView (heads/roster/focused/phase/lifecycle/cost/context — no behaviour field), NOT in fleet/meta. Frontend has zero visibility today.

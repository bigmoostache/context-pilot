    ### cp binary facts: src/main.rs parses args MANUALLY — only `--resume-stream`. NO clap, NO --model/--headless/--folder. An agent self-registers by running cp with CP_BRIDGE=1 + cwd=<folder> (cp-mod-bridge Boot::start_in writes registry/oplog/heartbeat/socket). Name derived from folder basename (meta.rs). Model/name come from the TUI's own config in that folder (fresh defaults).


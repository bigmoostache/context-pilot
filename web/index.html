<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <!-- iOS home-screen glyph. Safari uses this PNG (NOT the SVG favicon, NOT
         the manifest icons) for the Add-to-Home-Screen icon; without it iOS
         falls back to a blurry screenshot of the page (T621). 180×180 is the
         current iPhone @3x home-screen size; iOS downscales it for every other
         slot and applies its own rounded-rect mask. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- NO <link rel="manifest"> ON PURPOSE (T639). On iOS 16.4+ a linked
         manifest with `display: standalone` makes Safari launch the Add-to-
         Home-Screen app via the MANIFEST PWA path, which reserves an OPAQUE
         status bar and no longer honours
         `apple-mobile-web-app-status-bar-style=black-translucent` — so the web
         view stops extending under the status bar and loses its edge-to-edge
         full-screen look (the T639 regression). Leaving the manifest UNLINKED
         drops iOS back to the legacy apple-mobile-web-app standalone path,
         which black-translucent + viewport-fit=cover drive edge-to-edge. The
         iOS home-screen icon still comes from the apple-touch-icon above (NOT
         the manifest), so nothing is lost on iOS. public/site.webmanifest is
         kept in the tree for a future Android/Chrome install, where it would be
         re-linked behind a platform check. -->
    <!-- viewport-fit=cover lets the layout extend edge-to-edge INTO the safe
         areas (notch / status bar / home indicator); the reclaimed regions are
         then exposed to CSS as env(safe-area-inset-*) so content can pad away
         from the clock/battery while the background still fills the whole
         screen. Required for the "content under the status bar" look below. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Context Pilot — phosphor cockpit interface (design maquette)"
    />
    <!-- iOS standalone web app (Add to Home Screen). A PLAIN Safari TAB cannot
         hide Safari's own chrome (the bottom back/URL/tabs toolbar) or draw
         into the status bar — that is browser/OS chrome, not the page's. The
         ONLY way a web page reclaims that space on iPhone is to run as a
         standalone home-screen app: these meta tags make it launch fullscreen
         with NO Safari chrome, and `black-translucent` makes the web view
         extend UNDER the status bar so content flows edge-to-edge behind the
         clock/battery (padded off via env(safe-area-inset-top)). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Context Pilot" />
    <title>Context·Pilot — Cockpit</title>
    <!-- Set the theme class before first paint to avoid a light→dark flash
         (FOUC). Mirrors the logic in src/lib/theme.tsx: honour the saved
         preference, otherwise fall back to the OS `prefers-color-scheme`. -->
    <script>
      ;(function () {
        try {
          var t = localStorage.getItem("cp-theme")
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"
          }
          if (t === "dark") document.documentElement.classList.add("dark")
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

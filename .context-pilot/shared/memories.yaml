  contents: |-
    Two stylelint rules damage a Tailwind v4 CSS entry point when --fix runs:
    1. import-notation: rewrites `@import "tailwindcss"` into `@import url("tailwindcss")`. Tailwind's PostCSS plugin only recognizes the BARE-STRING form; url() form yields ZERO utility classes = total styling loss ('2005 look', only inline styles + CSS vars survive).
    2. property-no-vendor-prefix: DELETES load-bearing -webkit- prefixes (-webkit-backdrop-filter on .vibrancy, -webkit-appearance on finder slider) turning them into duplicate plain props = Safari breakage.

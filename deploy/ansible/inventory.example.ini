# Example inventory — ONE GROUP PER CLIENT. Copy to inventory.ini and edit.
# `ansible_host` is the box LAN IP (also shown on the printed delivery sheet).
#
# Each client's provider API keys live in group_vars/<client>/vault.yml
# (ansible-vault encrypted), so different clients get different keys.
#
#   # one client:
#   ansible-playbook -i inventory.ini deploy/ansible/site.yml --limit acme --ask-vault-pass
#   # the whole fleet:
#   ansible-playbook -i inventory.ini deploy/ansible/site.yml --ask-vault-pass

[acme]
acme-01 ansible_host=192.168.1.116 ansible_user=root ansible_python_interpreter=/usr/bin/python3
# acme-02 ansible_host=192.168.1.117 ansible_user=root ansible_python_interpreter=/usr/bin/python3

[globex]
# globex-01 ansible_host=10.0.0.5 ansible_user=root ansible_python_interpreter=/usr/bin/python3

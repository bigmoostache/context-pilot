5623177cb0b0ed7d:
  tl_dr: 'MULTI-WORKER (subworkers branch): N equal workers in one Rust loop. Decisions + arch in contents.'
  contents: |-
    ## Multi-Worker (subworkers) — Locked Decisions (8 rulings, 2026-06-13)

    1. **Concurrency**: background (non-focused) workers KEEP RUNNING (stream + execute tools). True concurrency, single main loop. Focused vs background differ ONLY in rendering + input routing; switching does NOT pause the previous worker.
    2. **Model/theme**: BOTH SHARED across all workers.
    3. **Identity**: worker_id = SHORT random id (8 hex), used as state filename. display_name = free-text label. (Not slug, not full UUID.)
    4. **Cost**: per-worker token/cost counters keyed by worker_id; NET-NEW persistence in WorkerState.
    5. **BG autonomy = FULL**: unfocused workers execute ALL tools freely incl shared mutations + file edits. User owns collisions.
    6. **BG visibility = STATUS-BAR aggregate by STATE (no push notifications)**. Buckets: WORKING = {streaming, tooling, waiting}; NEEDS-ATTENTION = {idle, asked-question, blocked, errored}. Badge counts BACKGROUND workers. User's words: 'status bar shows count per type: working (streaming, tooling, waiting), requires attention (idle, asked question)'.
    7. **Guard rails = PER-WORKER ONLY** (no global ceiling; N workers can collectively overspend, accepted).
    8. **Reverie = ALL workers may auto-reverie, with a GLOBAL concurrent cap** (REVERIE_GLOBAL_CAP).
    9. **Max workers = soft cap 8** (create blocked beyond, with message).
    10. **Delete = CONFIRM in overlay** (nukes conversation/panels/scratch). Delete-last → fresh empty worker. Deleting mid-stream aborts that worker's stream.
    11. **File collisions = NON-ISSUE** (tools serialize on single main loop → concurrent edits = sequential edits, normal Edit/Write last-write-wins). NO warning/lock.

    ## Shared vs per-worker (is_global grep, authoritative)
    - SHARED (is_global=true): files, firecrawl, tree, memory, brave, logs, entities, callback, prompt, ocr, conversation, conversation_history, overview, questions (14).
    - PER-WORKER (is_global=false): queue, git, spine, scratchpad, todo, console, github, search (8).
    - Messages already per-worker via WorkerState.important_panel_uids.

    ## Proposed defaults (pending veto, in design doc)
    - Route B for Phase 3 shared state; shared-route ONLY real-in-memory modules (memory/logs/tree/callback-defs/prompt-lib); entities(SQLite)/search(Meili) keep cheap per-worker caches on shared backing store.
    - Watchers = UNION across all workers (refcounted); forced by full bg autonomy.
    - global_next_uid → promote to first-class Shared field (drop overview-module hack); seeded from max on migration.
    - Phase 3 fairness = round-robin: each worker advances pipeline one step per tick.
    - Ctrl+S overlay: ↑↓ nav, Enter switch, n new (inline name prompt), d delete (confirm), Esc close.
    - SCHEMA_VERSION 1→2 + migration adopts main_worker as worker #1.

    ## Branch: subworkers (off master). Doc: docs/design-subworkers.md. Phasing: 1+2 definitive, 3 specified-flagged, 4 deferred-with-user (logs).
  importance: critical
  labels:
  - subworkers
  - multi-worker
  - architecture
  - design
  - active
  last_edited_ms: 0
5fca4a81f0734c4f:
  tl_dr: T271 agent retire/unretire SHIPPED end-to-end (orchestrator + web). Stop-and-keep, not delete. Details in contents.
  contents: |-
    ## T271 — agent retiring (retire/unretire) SHIPPED

    User ask: wire 'retiring' (name it that, NOT archiving). (1) stop the agent's rust process + console server; (2) do NOT delete the realm folder; (3) show retired agents in a separate dashboard section; (4) same-path create must still fail; (5) unretire is trivial — an orchestrator-level bool (NOT agent-level state).

    ### Backend
    - **services/retire.rs** RetiredStore: RetiredRecord{id,name,folder,model,provider,retired_at_ms} persisted to <agents_dir>/retired.json (atomic tmp->rename). load/is_retired/is_folder_retired/list(most-recent-first)/retire/unretire. Why a SEPARATE store (not registry Entry): the agent writes+removes its own <id>.json on clean shutdown — exactly the moment retire kills it — so the registry can't be the retired source of truth, and the store must carry a render snapshot surviving the agent's death + a backend restart. list_entries' guarded Entry deserialize silently skips retired.json. Lives in services/ (pure single-owner data, like CostBreaker) — moved there from a top-level src/retire.rs because orchestrator/src hit the 8-entry folder cap.
    - **rest/retire.rs** retire_agent: resolve_entry -> snapshot RetiredRecord (provider via meta::read_provider BEFORE kill) -> supervisor::kill_pid(pid) lock-free -> kill console server via <folder>/.context-pilot/console/server.pid (the console daemon survives TUI restarts by design, so it must be killed explicitly) -> drop stale supervised record -> retired.retire+persist -> 200. unretire_agent: retired.unretire (404 if absent) + spawn_pty same folder (respawn re-registers under SAME id) -> 202.
    - **create.rs** 409 guard: reject create if retired.is_folder_retired(folder) ('a retired agent owns this realm folder — unretire it instead').
    - **meta.rs** fleet_retired endpoint (Agent-shaped JSON, status:retired, retiredAt) + fleet_meta filters OUT retired agents from the active fleet. read_provider made pub(crate).
    - **transport/mod.rs** Backend.retired:RetiredStore field + RetiredStore::load(agents_dir) in Backend::new; routes POST /api/agent/{id}/retire + /unretire + GET /api/fleet/retired. rest/mod.rs re-exports retire_agent/unretire_agent.

    ### Frontend
    - api.ts: retireAgent/unretireAgent/fetchRetiredFleet + RetireReceipt/UnretireReceipt types.
    - live.ts: useRetiredFleet (useLive over /fleet/retired, no SSE) + useRetireAgent/useUnretireAgent (useMutation, invalidate qk.fleet()+qk.retiredFleet() immediately + on a short delay since kill/registry-removal/respawn settle async). qk.retiredFleet added in sync.ts.
    - AgentModal: manage-mode footer 'Retire' button (was a cosmetic 'Archive') wired to useRetireAgent.
    - FleetDashboard: RetiredSection (renders only when >=1 retired) + RetiredCard (dashed, identity + folder + one-click Unretire via useUnretireAgent). Active fleet unchanged.

    ### Proven LIVE (orchestrator debug :7878, agent 834eb459c7b064db ~/code/test)
    retire -> 200 {status:retired}; excluded from /fleet/meta; listed in /fleet/retired; create same path -> 409; unretire -> 202 {status:unretiring,pid:66076}; cleared from retired; re-registered under same id in active fleet; unretire unknown -> 404.

    ### Tests
    lib 105/105 + all integration green. ALSO fixed pre-existing rot that X896 left (CB3 rust-check is lib-only so it never surfaced): all 6 tests/ files needed `use portable_pty as _;` + Backend::new 2->4 arg. AND rewrote 3 STALE SSE tests (end_to_end x2, transport_http ticket) that encoded pre-T123 cold-connect-replays-history semantics — fixed via the reconnect-replay path (Last-Event-ID=0), no production code change: end_to_end test 1 pre-seeds rev 0 so the command lands at rev 1 then replays it; soak + ticket test add Last-Event-ID=0. LATENT off-by-one surfaced (NOT fixed, documented): empty-log cold connect seeds(0) and drops the first append rev 0; fix would be oplog_head_rev->Option, seed only if Some.

    GOTCHA reused: orchestrator restart REQUIRED after backend change (running binary goes stale independently of TUI reload) — killed :7878 via lsof, relaunched debug CP_COST_BUDGET=100000000. No TUI crate changed -> no system_reload needed.

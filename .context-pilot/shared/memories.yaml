    - COMMAND CREATE path: POST /api/agent/{id}/library/command (create.rs create_command) writes .md to commands dir; agent fs-watch picks up; frontend useCreateCommand invalidates qk.library. Frontend: fetchLibrary/createCommand in web/src/lib/api/index.ts, useCreateCommand in web/src/lib/live/mutations.ts, LibraryItem type in generated.

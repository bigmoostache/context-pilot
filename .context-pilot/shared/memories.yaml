  tl_dr: 'Search module: Voyage AI REST embedder (voyage-code-3) for hybrid search, zero local CPU. VOYAGE_API_KEY in ~/.context-pilot/.env. --max-indexing-threads 2. Port reconnects on reload.'
  contents: |-
    - Project hash: c7f7b6db, ~4196 chunks across ~1399 files
    - Embedder: voyage-code-3, 1024 dims, Meilisearch 'rest' source
    - API key: VOYAGE_API_KEY in global ~/.context-pilot/.env
    - Server flags: --max-indexing-threads 2 caps indexing CPU
    - load_module_data() calls ensure_server_running() to pick up live port
    - ensure_indexes() called on reload to re-add embedders if missing
    - Keyword search always works even without Voyage API key
    - Doc IDs sanitized to [a-zA-Z0-9_-]
    - OCR cache at ~/.context-pilot/ocr-cache/
    - Boot loads .env before module init
  importance: high

# Curated list of allowed #[expect(...)] and #[allow(...)] annotations.
#
# Every occurrence in the codebase MUST have an entry here, or the
# structure-check will fire an ERROR. This keeps lint suppression
# intentional, visible, and continuously reviewed.
#
# Fields:
#   path          — file path relative to repo root
#   match         — exact string that appears on the annotation line(s)
#   reason        — why this exception is currently accepted
#   strategy      — ideas to eventually eliminate it
#
# To add a new exception: append an entry, run the structure-check,
# and ensure it passes. To remove one: delete the entry AND the
# annotation from the source code.

exceptions:
  # ── cast.rs: SafeCast macro infrastructure ──────────────────────────

  - path: "crates/cp-base/src/cast.rs"
    match: '#![expect('
    reason: >
      Module-level expect for clippy::allow_attributes. The SafeCast
      macros expand #[allow(...)] for different types — some lint triggers
      are type-dependent, so #[expect] (which requires the lint to fire)
      would produce unfulfilled-expectation errors on certain expansions.
    strategy: >
      Wait for Rust RFC to support conditional #[expect] per type
      parameter, or replace macros with a build.rs code generator that
      emits per-type impls with precise annotations.

  - path: "crates/cp-base/src/cast.rs"
    match: 'trivial_numeric_casts, trivial_casts, clippy::cast_lossless, clippy::cast_possible_truncation, clippy::cast_sign_loss, clippy::cast_possible_wrap, clippy::cast_precision_loss, reason = "macro-generated identity casts'
    reason: >
      Unsigned SafeCast macro impl. Raw `as` casts are the whole point of
      this module — it centralizes all numeric casts behind saturating
      wrappers so the rest of the codebase never uses raw `as`.
    strategy: >
      Replace macros with a proc-macro or build.rs that generates
      per-type impls, each with only the #[allow] lints that actually
      trigger for that specific source/target pair.

  - path: "crates/cp-base/src/cast.rs"
    match: 'reason = "macro-generated identity casts are unavoidable'
    reason: >
      Signed SafeCast macro impl. Same rationale as the unsigned variant —
      macro-generated identity casts are unavoidable with the current
      approach.
    strategy: >
      Same as above — proc-macro or build.rs per-type generation.

  - path: "crates/cp-base/src/cast.rs"
    match: 'f64 SafeCast impl: saturating casts necessarily use raw'
    reason: >
      Concrete f64 SafeCast impl. Only cast_possible_truncation and
      cast_sign_loss fire — reduced from 5 lints in the old #[allow].
      Uses #[expect] (compiler-verified) instead of #[allow].
    strategy: >
      No further reduction — truncation and sign_loss are inherent
      to f64→integer casts. Identity to_f64 triggers nothing.

  - path: "crates/cp-base/src/cast.rs"
    match: 'f32 SafeCast impl: saturating casts necessarily use raw'
    reason: >
      Concrete f32 SafeCast impl. Same as f64 — only truncation and
      sign_loss fire. Uses #[expect] instead of #[allow].
    strategy: >
      No further reduction — same as f64.

  # ── config/mod.rs: invariant_panic ──────────────────────────────────

  - path: "crates/cp-base/src/config/mod.rs"
    match: '#[expect(clippy::panic'
    reason: >
      invariant_panic() is the centralized panic point for build-time and
      config invariant violations (YAML not found, theme not loaded, module
      state not initialized). These are unrecoverable programmer errors,
      not runtime failures.
    strategy: >
      Consider compile-time validation (const fn / build.rs assertions)
      for YAML and theme invariants. For module state, explore a type-state
      pattern where uninitialized state is unrepresentable.

  # ── compiler.rs: chrono timezone arithmetic ────────────────────────

  - path: "crates/cp-mod-typst/src/compiler.rs"
    match: 'chrono offset arithmetic cannot overflow'
    reason: >
      Adding a timezone offset (±12h) to a UTC datetime. chrono::Duration
      arithmetic cannot overflow for valid timezone offsets.
    strategy: >
      Irreducible — chrono's Add impl requires the caller to handle the
      arithmetic lint. The offset range (±12h) is always safe.

  # ── panels.rs: time_arith module ────────────────────────────────────

  - path: "crates/cp-base/src/panels.rs"
    match: '#[expect(clippy::integer_division_remainder_used'
    reason: >
      Centralized time arithmetic module: ms_to_secs(), secs_to_hms(),
      secs_to_hms_unwrapped(). All truncating integer division for time
      conversions is funneled here — no other file in the codebase
      performs raw / 1000 or % 3600.
    strategy: >
      Fundamentally irreducible — integer truncation IS the desired
      behavior for millisecond-to-second conversion. No alternative
      representation avoids it.

  # ── coucou.rs: calendar modulo ──────────────────────────────────────

  - path: "crates/cp-mod-spine/src/coucou.rs"
    match: '#[expect(clippy::integer_division_remainder_used'
    reason: >
      is_leap_year() uses y % 4, y % 100, y % 400 — the canonical
      Gregorian leap year formula. Modulo IS the algorithm; there is
      no refactoring that avoids it.
    strategy: >
      Replace hand-rolled date math with the chrono crate, which would
      eliminate the need for is_leap_year() entirely. Low priority —
      the current impl is correct and minimal.

  # ── cp-mod-logs/lib.rs: chunked persistence + token estimation ──────

  - path: "crates/cp-mod-logs/src/lib.rs"
    match: 'intentional truncating arithmetic"'
    reason: >
      chunk_index divides log IDs by LOGS_CHUNK_SIZE for chunked
      persistence. Truncating integer division IS the algorithm.
    strategy: >
      Could use a generic div_floor helper but adds no value —
      single-use function with trivially correct arithmetic.

  - path: "crates/cp-mod-logs/src/lib.rs"
    match: 'token estimation'
    reason: >
      Token estimation heuristic: word_count * 4 / 3 approximates BPE
      token count. Division IS the algorithm.
    strategy: >
      Could extract an approx_tokens(text) helper to cp-base, but it's
      a single-use heuristic with no reuse potential.

  # ── module_name_repetitions: names that include their module ────────
  # Types used via re-export where the shorter name conflicts with
  # common identifiers (reserved words, std types, or sibling types).

  - path: "crates/cp-base/src/cast.rs"
    match: 'SafeCast'
    reason: >
      "Safe" alone is meaningless. SafeCast is the centralized numeric
      casting trait — used via re-export at 50+ callsites.
    strategy: >
      Only viable if cast module is always used qualified (cast::Safe).

  - path: "crates/cp-base/src/state/autocomplete.rs"
    match: 'AutocompleteEntry'
    reason: >
      "Entry" alone conflicts with HashMap::Entry and other entry types.
    strategy: >
      Only viable with crate-level namespace change.

  - path: "crates/cp-base/src/state/autocomplete.rs"
    match: 'AutocompleteState'
    reason: >
      "State" conflicts with the runtime State struct.
    strategy: >
      Only viable with crate-level namespace change.

  - path: "crates/cp-base/src/state/context.rs"
    match: 'ContextTypeMeta'
    reason: >
      "TypeMeta" alone is too generic across a codebase with many
      metadata types.
    strategy: >
      Rename if module path is always explicit at callsites.

  - path: "crates/cp-base/src/state/context.rs"
    match: '381 callsites via re-export'
    reason: >
      ContextType — "Type" is a reserved Rust keyword.
    strategy: >
      Irreducible — reserved keyword conflict.

  - path: "crates/cp-base/src/state/context.rs"
    match: '78 callsites via re-export'
    reason: >
      ContextElement — "Element" alone is too generic.
    strategy: >
      Could rename to PanelElement but churn is enormous.

  - path: "crates/cp-base/src/state/data/message.rs"
    match: '52 callsites via re-export'
    reason: >
      MessageType — "Type" is a reserved keyword.
    strategy: >
      Irreducible — reserved keyword conflict.

  - path: "crates/cp-base/src/state/data/message.rs"
    match: '58 callsites via re-export'
    reason: >
      MessageStatus — "Status" alone conflicts with ProcessStatus,
      SessionStatus, NotificationStatus.
    strategy: >
      Could rename to MsgStatus but low value.

  - path: "crates/cp-base/src/state/data/config.rs"
    match: 'SharedConfig'
    reason: >
      "Shared" alone conveys no meaning. Distinguishes from per-worker
      WorkerState.
    strategy: >
      Could rename to GlobalConfig but SharedConfig is established.

  - path: "crates/cp-base/src/state/mod.rs"
    match: 'ReverieState/ReverieType'
    reason: >
      "State" and "Type" both conflict with common identifiers.
    strategy: >
      Only resolvable by moving reverie to its own crate.

  - path: "crates/cp-base/src/tools/pre_flight.rs"
    match: 'PreFlightResult'
    reason: >
      "Result" conflicts with std::result::Result.
    strategy: >
      Irreducible — std::Result conflict.

  # ── profiler.rs: microsecond-to-millisecond division ────────────────

  - path: "src/infra/profiler.rs"
    match: 'microsecond-to-millisecond truncating conversion'
    reason: >
      us / 1000 converts microseconds to milliseconds. Truncating integer
      division IS the desired behavior — sub-millisecond precision is
      intentionally discarded for logging thresholds.
    strategy: >
      Could extract a us_to_ms() helper to cp-base::panels::time_arith,
      but it's a single-use conversion with trivially correct arithmetic.

  # ── config.rs: budget step/min division ──────────────────────────────

  - path: "src/app/actions/config.rs"
    match: '5% step via division is the algorithm'
    reason: >
      budget_step() computes max_budget / 20 for 5% increments.
      Truncating integer division IS the algorithm.
    strategy: >
      Irreducible — integer truncation is the desired behavior for
      percentage-based budget stepping.

  - path: "src/app/actions/config.rs"
    match: '10% floor via division is the algorithm'
    reason: >
      budget_min() computes max_budget / 10 for 10% minimum floor.
      Truncating integer division IS the algorithm.
    strategy: >
      Irreducible — integer truncation is the desired behavior for
      percentage-based budget floor.

  # ── streaming.rs: stream-done handler ──────────────────────────────

  - path: "src/app/actions/streaming.rs"
    match: 'stream-done parameters map 1:1 to API response fields'
    reason: >
      handle_stream_done() takes 6 parameters (state, input_tokens,
      output_tokens, cache_hit_tokens, cache_miss_tokens, stop_reason)
      because each maps directly to an API response field.
    strategy: >
      Could introduce a StreamDoneParams struct, but it adds indirection
      for a single callsite with no reuse benefit.

  # ── ui/helpers.rs: spinner modulo ────────────────────────────────────

  - path: "src/ui/helpers.rs"
    match: 'modulo for cyclic spinner index is the algorithm'
    reason: >
      spinner() uses frame_counter % SPINNER_BRAILLE.len() to cycle
      through animation frames. Modulo IS the algorithm.
    strategy: >
      Irreducible — cyclic indexing requires modulo.

  # ── ui/perf/mod.rs: ring buffer modulo ──────────────────────────────

  - path: "src/ui/perf/mod.rs"
    match: 'ring buffer push: modulo for cyclic index wrap'
    reason: >
      RingBuffer::push() uses modulo to wrap write_pos around
      the fixed-size ring. Modulo IS the algorithm.
    strategy: >
      Irreducible — ring buffer cycling requires modulo.

  - path: "src/ui/perf/mod.rs"
    match: 'ring buffer recent: modulo for cyclic index wrap'
    reason: >
      RingBuffer::recent() uses modulo to wrap read indices around
      the fixed-size ring. Modulo IS the algorithm.
    strategy: >
      Irreducible — ring buffer cycling requires modulo.

  # ── ui/help/config_overlay.rs: spinner modulo ───────────────────────

  - path: "src/ui/help/config_overlay.rs"
    match: 'modulo for cyclic spinner index is the algorithm'
    reason: >
      render_api_check() uses frame_counter % spinner_chars.len() to
      cycle through spinner animation frames. Modulo IS the algorithm.
    strategy: >
      Irreducible — cyclic indexing requires modulo.

  # ── ui/help/config_overlay.rs: token formatting division ────────────

  - path: "src/ui/help/config_overlay.rs"
    match: 'render_budget_bars: truncating division for human-readable K/M token display'
    reason: >
      render_budget_bars() divides token counts by 1,000 or 1,000,000
      for human-readable K/M display. Truncating integer division IS
      the desired behavior.
    strategy: >
      Could extract a format_tokens_compact() helper, but it's a
      localized display-only conversion with trivially correct arithmetic.

  - path: "src/ui/help/config_overlay.rs"
    match: 'render_model_line_with_info: truncating division for human-readable K/M token display'
    reason: >
      render_model_line_with_info() divides context window sizes by
      1,000 or 1,000,000 for human-readable K/M display. Truncating
      integer division IS the desired behavior.
    strategy: >
      Could extract a format_tokens_compact() helper, but it's a

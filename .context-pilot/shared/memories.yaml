76bca3b377df349e:
  tl_dr: 'v0.2.7 SSE freeze: FOUR watchdogs. 3 inner (streaming.rs, never fired in field) + 1 OUTER catch-all (mod.rs start_streaming, TTFB 100s relay+watchdog, fires wherever do_stream blocks) + oauth.rs timeouts (10s/30s). Pending commit+tag v0.2.7.'
  contents: |-
    ## SSE Freeze Fix — v0.2.4 + v0.2.5

    ### v0.2.4 (body-read watchdog) — INSUFFICIENT ALONE
    IdleTimeoutReader (reader-thread + recv_timeout, IDLE_READ_TIMEOUT=120s) in src/llms/claude_code_api_key/streaming.rs guards the SSE BODY read loop. Aborts silent app-level holds AFTER response headers arrive. Shared by all 3 claude_code* clients.

    ### v0.2.5 (send-header watchdog) — THE MISSING PIECE
    DEFINITIVE root cause (gpt2 re-run on v0.2.4, job 00-03-22): froze AGAIN at 'start' 7min. Evidence: container Up 8min, tui Sl 0.7% CPU, EXACTLY 1 established conn to :443, NO sse_errors.log, watchdog never fired. The silent hold is in the RESPONSE-HEADERS wait inside reqwest blocking .send() — connect_timeout covers only TCP connect; once connected .send() blocks awaiting headers with NO timeout (.timeout(None)). IdleTimeoutReader only arms AFTER send() returns Ok, so that phase was unguarded -> infinite hang -> 900s wall -> 0.0.

    FIX: pub(crate) fn send_with_header_timeout(builder) in claude_code_api_key/streaming.rs. Spawns a detached thread running builder.send(), waits rx.recv_timeout(SEND_HEADER_TIMEOUT=60s). Timeout -> Err(StreamRead) -> StreamEvent::Error -> existing fresh-connection retry. Ok(Err)->Network; Disconnected->Network. Same leak caveat as IdleTimeoutReader (timed-out send thread parks until process exit; negligible for short-lived TB tasks).

    Wired at ALL 3 streaming call sites: claude_code/mod.rs, claude_code_api_key/mod.rs, claude_code_v2/mod.rs — each binds the request builder then `let response = ...::send_with_header_timeout(request_builder)?;` replacing the inline `.send()?`.

    Status: rust-check passed, cargo build --release 6.78s, TUI reloaded (live). Adapter version() bumped 0.2.4->0.2.5. REMAINING: git commit+push (with memories+tree-descs per M15) + tag v0.2.5 -> release CI publishes context-pilot-linux-x86_64.tar.gz to releases/latest.
  importance: high

9a2449142b04169a:
  tl_dr: 'Freeze RESOLVED at infra level (v0.2.8 deadman + v0.2.9 + v0.2.10 deadman-aware-of-retry). Throttle REJECTED: gpt2 dribbles even at 1% OAuth util (pathological, gpt2-specific). Normal tasks pass. Deprioritize gpt2; pivot to other tasks.'
  contents: |-
    SAGA (gpt2-codegolf X572, freeze v0.2.4–v0.2.9+):

    v0.2.8 DEADMAN proved the freeze is a HUNG stream (alive loop), not a wedge. /proc: thread state=R read()ing SSE socket pulling a dribble that never emits message_stop. Re-exec recovered (attempt #3 got healthy conn, 2 Think turns) but hang recurred → 3 trips → reward 0.

    v0.2.9 (src/llms/claude_code_api_key/streaming.rs:76 + loop@334): STREAM_COMPLETION_TIMEOUT=90s wall-clock from stream_start → if no message_stop within 90s → StreamRead → in-process MAX_API_RETRIES(=4) retry on fresh conn. CONFIRMED FIRING (job 02-13-03, container 5l4vrdr): error_1.txt = 'message did not finalize within 90s ... 124 lines / 5885 bytes seen, got_content=true. Attempt 1/4 (will retry)'. got_content=true proves the dribble mode (content flowed then stalled; disarmed all 4 prior guards). Binary has the const (strings grep=1).

    v0.2.9 LIMITATION FOUND: the v0.2.8 deadman STILL tripped at 184s and re-exec'd (CP_DEADMAN_REEXEC_COUNT=1, deadman.log present, 'no task progress 184812ms'). ROOT: deadman's LAST_PROGRESS_MS only bumps on messages.len() growth (message FINALIZED). v0.2.9 retries hang at 90s each WITHOUT finalizing → LAST_PROGRESS ages → after ~2 failed retries (180s) deadman PREEMPTS v0.2.9's 4×90s=360s retry budget → re-exec before in-process retry can land a healthy conn. The deadman and v0.2.9 fight each other.

    v0.2.10 FIX (design): bump LAST_PROGRESS_MS on stream-RETRY activity (or any StreamEvent / retry initiation), not just on message finalization. Then: true wedge→LOOP_HEARTBEAT(30s) catches; truly silent hang (no retry activity)→LAST_PROGRESS catches; v0.2.9 actively cycling connections→deadman stays out of the way, lets the 4 retries complete. Safe because exhausted retries produce a terminal StreamError (not a silent hang).

    CONFOUND: this session EVERY stream dribbled (not connection-specific like v0.2.8's run) — likely worsened by my OWN OAuth at 60% five_hour util (near rate limit → throttled/dribbled responses). Consider waiting for OAuth reset before concluding the dribble is fundamental vs throttle-induced. STATUS: gpt2 v0.2.9 run still going (re-exec #1), likely 0 again this session. v0.2.9 mechanism = WIN; v0.2.10 deadman-aware-of-retry = next.
  importance: critical

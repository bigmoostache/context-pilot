[workspace]
members = [".", "crates/cp-base", "crates/cp-mod-callback", "crates/cp-mod-console", "crates/cp-mod-files", "crates/cp-mod-git", "crates/cp-mod-github", "crates/cp-mod-logs", "crates/cp-mod-memory", "crates/cp-mod-queue", "crates/cp-mod-scratchpad", "crates/cp-mod-spine", "crates/cp-mod-todo", "crates/cp-mod-tree", "crates/cp-mod-prompt", "crates/cp-mod-preset", "crates/cp-mod-typst", "crates/cp-mod-brave", "crates/cp-mod-firecrawl"]

[workspace.dependencies]
cp-base = { path = "crates/cp-base" }
ratatui = "0.30"
crossterm = "0.29"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
sha2 = "0.10"
chrono = "0.4"
regex = "1.10"
ignore = "0.4"
globset = "0.4"
unicode-width = "0.2"
reqwest = { version = "0.12", features = ["blocking", "json"] }

[workspace.lints.rust]
# Visibility hygiene — flag pub items that don't need to be pub
unreachable_pub = "warn"
# Dead code in the workspace (redundant with default, but explicit)
dead_code = "warn"
# Unused imports, variables, mut bindings
unused_imports = "warn"
unused_variables = "warn"
unused_mut = "warn"
# Missing Debug impls on public types (good for inspectability)
missing_debug_implementations = "warn"
# Elided lifetimes in impl blocks — forces explicit 'a where it matters
elided_lifetimes_in_paths = "warn"
# Prefer crate-relative paths
absolute_paths_not_starting_with_crate = "warn"
# Ambiguous negative literals — force parens
ambiguous_negative_literals = "warn"
# Prefer async || over || async {}
closure_returning_async_block = "warn"
# 2024: deprecated safe on extern fns
deprecated_safe_2024 = "deny"
# Deref into dyn supertrait ambiguity
deref_into_dyn_supertrait = "warn"
# 2024: expr fragment specifier change
edition_2024_expr_fragment_specifier = "deny"
# Explicit outlives bounds that can be inferred
explicit_outlives_requirements = "warn"
# 2024: if-let temporary rescoping
if_let_rescope = "deny"
# impl Trait overcaptures lifetimes
impl_trait_overcaptures = "warn"
# Using 2024 keywords as identifiers
keyword_idents_2024 = "deny"
# Silently dropping a guard with let _ = ...
let_underscore_drop = "deny"
# #[macro_use] on extern crate
macro_use_extern_crate = "deny"
# Macro meta-variable misuse
meta_variable_misuse = "deny"
# Missing Copy on types that could derive it
missing_copy_implementations = "warn"
# Missing docs on public items
missing_docs = "warn"
# Missing unsafe on extern blocks (2024)
missing_unsafe_on_extern = "deny"
# Non-ASCII identifiers
non_ascii_idents = "deny"
# Redundant imports
redundant_imports = "deny"
# Redundant lifetime parameters
redundant_lifetimes = "warn"
# 2024: guarded string syntax
rust_2024_guarded_string_incompatible_syntax = "deny"
# 2024: incompatible patterns
rust_2024_incompatible_pat = "deny"
# 2024: prelude collisions
rust_2024_prelude_collisions = "deny"
# Single-use lifetime parameters
single_use_lifetimes = "warn"
# 2024: tail expression drop order
tail_expr_drop_order = "deny"
# Trivial casts (e.g. &T as &T)
trivial_casts = "deny"
# Trivial numeric casts (e.g. u32 as u32)
trivial_numeric_casts = "deny"
# Binding a unit value
unit_bindings = "deny"
# Types that can't be named by external users
unnameable_types = "warn"
# unsafe attribute without unsafe() wrapper (2024)
unsafe_attr_outside_unsafe = "deny"
# All unsafe code must be opted-in per module
unsafe_code = "deny"
# Unsafe operations inside unsafe fn need unsafe blocks
unsafe_op_in_unsafe_fn = "warn"
# Unused crate dependencies
unused_crate_dependencies = "deny"
# Unused extern crates
unused_extern_crates = "deny"
# Unnecessary braces around single import
unused_import_braces = "deny"
# Unused lifetime parameters
unused_lifetimes = "deny"
# Unused macro rules
unused_macro_rules = "warn"
# Unnecessary path qualifications
unused_qualifications = "warn"
# Unused return values
unused_results = "warn"
# Large variant size differences
variant_size_differences = "warn"

[workspace.lints.clippy]
# Performance
needless_pass_by_value = "warn"
cloned_instead_of_copied = "warn"
redundant_clone = "warn"
large_enum_variant = "warn"
# Clarity
needless_return = "warn"
manual_let_else = "warn"
match_wildcard_for_single_variants = "warn"
implicit_clone = "warn"
# Safety / correctness
cast_possible_truncation = "warn"
cast_sign_loss = "warn"
# Style consistency
enum_glob_use = "warn"
single_match_else = "warn"
redundant_else = "warn"
semicolon_if_nothing_returned = "warn"

[package]
name = "tui"
version = "0.1.0"
edition = "2024"

[dependencies]
cp-base.workspace = true
cp-mod-console = { path = "crates/cp-mod-console" }
cp-mod-callback = { path = "crates/cp-mod-callback" }
cp-mod-scratchpad = { path = "crates/cp-mod-scratchpad" }
cp-mod-todo = { path = "crates/cp-mod-todo" }
cp-mod-memory = { path = "crates/cp-mod-memory" }
cp-mod-tree = { path = "crates/cp-mod-tree" }
cp-mod-git = { path = "crates/cp-mod-git" }
cp-mod-logs = { path = "crates/cp-mod-logs" }
cp-mod-github = { path = "crates/cp-mod-github" }
cp-mod-files = { path = "crates/cp-mod-files" }
cp-mod-spine = { path = "crates/cp-mod-spine" }
cp-mod-preset = { path = "crates/cp-mod-preset" }
cp-mod-prompt = { path = "crates/cp-mod-prompt" }
cp-mod-typst = { path = "crates/cp-mod-typst" }
cp-mod-brave = { path = "crates/cp-mod-brave" }
cp-mod-firecrawl = { path = "crates/cp-mod-firecrawl" }
cp-mod-queue = { path = "crates/cp-mod-queue" }
crossterm.workspace = true
ratatui.workspace = true
serde.workspace = true
serde_json.workspace = true
serde_yaml.workspace = true
chrono.workspace = true
regex.workspace = true
reqwest = { version = "0.12", features = ["blocking", "json"] }
dotenvy = "0.15"
unicode-width.workspace = true
syntect = { version = "5.2", default-features = false, features = ["default-syntaxes", "default-themes", "regex-onig"] }
secrecy = { version = "0.10", features = ["serde"] }
notify = "6.1"

[lints]
workspace = true

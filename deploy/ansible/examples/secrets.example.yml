# Runtime secrets template — NEVER committed with real values.
#
# Copy to a gitignored local file (one per client) and pass at launch:
#   cp deploy/ansible/examples/secrets.example.yml deploy/ansible/acme.local.yml
#   $EDITOR deploy/ansible/acme.local.yml          # fill in real keys
#   chmod 600 deploy/ansible/acme.local.yml
#   ansible-playbook -i deploy/ansible/inventory.ini deploy/ansible/site.yml \
#     --limit acme -e @deploy/ansible/acme.local.yml -e release=local
#
# Use `-e @file` (not `-e KEY=value`): the file ref keeps values out of `ps` and
# shell history. `*.local.yml` here is gitignored. One file per `--limit <client>`
# run (extra-vars are global to the run).

# Provider/integration API keys for THIS client. List only what they should have.
cp_provider_keys:
  ANTHROPIC_API_KEY: "sk-ant-REPLACE-ME"
  # DEEPSEEK_API_KEY: "sk-REPLACE-ME"
  # Other pass-through names the orchestrator understands:
  # GROQ_API_KEY, XAI_API_KEY, MINIMAX_API_KEY, VOYAGE_API_KEY, DATALAB_API_KEY,
  # BRAVE_API_KEY, FIRECRAWL_API_KEY, GITHUB_TOKEN

# Optional overrides (else: random 20-char per-unit admin password, printed to the
# delivery sheet — recommended, leave unset).
# cp_admin_email: "ops@acme.corp"
# cp_admin_password: "…"

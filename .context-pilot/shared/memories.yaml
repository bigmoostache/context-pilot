    ## T148 — wire fleet-dashboard agent creation (PENDING, user said process LAST)

    User ask: 'From the main dashboard, the creation of agents does not work at all (still completely fake?) → make it work!'

    ### Current state (investigated 2026-06-19) — fully unwired end-to-end:
    1. FRONTEND: web/src/components/agents/AgentModal.tsx `submit()` = `onFlash(toast)` + `onClose()` ONLY. No API call. slugify/MODELS/realm-preview all cosmetic. api.ts (web/src/lib/api.ts) has NO createAgent function.
    2. BACKEND: transport route_rest (transport/mod.rs) has NO create-agent route. AgentSupervisor (supervisor/mod.rs: spawn/stop/restart/adopt, allow-list R2-15) EXISTS but is NEVER instantiated in Runtime (runtime.rs Runtime = {backend, config} only; driver loop scans/tails/folds, never spawns). Config (main.rs) has no binary path / allow-list.

    { from:32, to:34, text:'Context always returns to baseline' },

  ];

  /* ===== Subtitle lookup ===== */
  function getSub(subs, idx) {
    for (const s of subs) {
      if (idx >= s.from && idx <= s.to) return s.text;
    }
    return '';
  }

  /* ===== Rendering engine ===== */
  function renderFrame(containerId, meterId, frame, overflowId) {
    const container = document.getElementById(containerId);
    if (!container) return;

    const existingEls = {};
    container.querySelectorAll('.ctx-block').forEach(el => {
      existingEls[el.dataset.bid] = el;
    });

    const currentIds = new Set(frame.map(b => b.id));
    const totalPct = frame.reduce((s, b) => s + b.h, 0);

    /* Remove blocks no longer present */
    for (const [bid, el] of Object.entries(existingEls)) {
      if (!currentIds.has(bid)) {
        el.style.height = '0px';
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 500);
      }
    }

    /* Add or update blocks */
    frame.forEach((block, i) => {
      let el = existingEls[block.id];
      const hPx = Math.round((block.h / 100) * WINDOW_H);

      if (!el) {
        el = document.createElement('div');
        el.className = `ctx-block t-${block.type}`;
        el.dataset.bid = block.id;
        el.style.height = '0px';
        el.style.opacity = '0';
        const children = container.querySelectorAll('.ctx-block');
        container.insertBefore(el, children[i] || null);
        void el.offsetWidth;
      }

      if (block.label) el.textContent = block.label;
      el.style.height = hPx + 'px';
      el.style.opacity = '1';
      el.classList.add('visible');

      if (block.refresh) {
        el.classList.add('refreshing');
        setTimeout(() => el.classList.remove('refreshing'), 600);
      } else {
        el.classList.remove('refreshing');
      }
    });

    /* Meter */
    const meter = document.getElementById(meterId);
    if (meter) {
      meter.style.width = Math.min(totalPct, 100) + '%';
      meter.classList.toggle('danger', totalPct > 90);
    }

    /* Overflow */
    if (overflowId) {
      const ov = document.getElementById(overflowId);
      if (ov) ov.classList.toggle('visible', totalPct > 95);
    }
  }

  /* ===== Animation loops (independent with jitter) ===== */
  let classicFrame = 0;
  let cpFrame = 0;

  function jitterDelay() {
    return BASE_MS + Math.floor(Math.random() * JITTER * 2) - JITTER;
  }

  function tickClassic() {
    const ci = classicFrame % classicFrames.length;
    renderFrame('classic-blocks', 'classic-meter', classicFrames[ci], 'classic-overflow');
    const cSub = document.getElementById('classic-sub');
    if (cSub) cSub.textContent = getSub(classicSubs, ci) || '\u00a0';
    classicFrame++;
    window._ctxClassicTimer = setTimeout(tickClassic, jitterDelay());
  }

  function tickCp() {

    const pSub = document.getElementById('cp-sub');
    if (pSub) pSub.textContent = getSub(cpSubs, pi) || '\u00a0';

    window._ctxCpTimer = setTimeout(tickCp, jitterDelay());
  }

  /* Start CP with an initial offset so they don't sync */
  setTimeout(tickCp, Math.floor(BASE_MS * 0.4));

    - 30 (X797): transport + e2e (ticket single-use/TTL/unknown, REST rev-envelope+cmd receipt+body-hydrate+404/400, SSE Last-Event-ID replay-by-rev + gap→resync, END-TO-END loopback spawn→POST→journal→Tailer→SSE→reconnect, breaker-tripped-blocks, soak FD/thread/mem stability).

078f4dccf6448ca1:
  name: file-length
  description: Check that no .rs file exceeds 500 lines (CI gate)
  pattern: '*.rs'
  blocking: true
  timeout_secs: 10
  success_message: File lengths OK ✓
  is_global: true
  script_content: bash .github/checks/check-file-lengths.sh
8a485748bfb92873:
  name: rust-fmt
  description: Run cargo fmt --check on Rust file changes — catches formatting issues
  pattern: '*.rs'
  blocking: true
  timeout_secs: 10
  success_message: Fmt passed ✓
  is_global: true
  script_content: cargo fmt --check 2>&1
8d8b466f14a06946:
  name: lint-exceptions
  description: 'Verify every #[expect]/#[allow] annotation is registered in allowed-lint-exceptions.yaml'
  pattern: '*.rs'

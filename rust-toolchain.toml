[toolchain]
# Pinned to match the CI's RUST_VERSION. This file overrides the toolchain for
# EVERY cargo invocation (CI and the `cross` appliance build alike), so it must
# agree with what fmt/clippy and the workspace lint config are tuned for — 1.97.1.
# (Edition 2024 is fully supported; the lint config + hash chain are kept in sync
# with the 1.97 lint surface via chain.sh --update.)
channel = "1.97.1"
components = ["rustfmt", "clippy"]
targets = ["aarch64-unknown-linux-gnu", "aarch64-unknown-linux-musl"]

lean-check:
  name: lean-check
  description: Run lake build on Lean file edits to verify proofs type-check
  pattern: '*.lean'
  blocking: true
  timeout_secs: 120
  success_message: Lean proofs verified ✓
  is_global: true
  script_content: |
    FIRST_FILE=$(echo "$CP_CHANGED_FILES" | head -1)
    DIR="$CP_PROJECT_ROOT/$(dirname "$FIRST_FILE")"

    while [ "$DIR" != "/" ]; do
      if [ -f "$DIR/lakefile.toml" ] || [ -f "$DIR/lakefile.lean" ]; then
        break
      fi
      DIR=$(dirname "$DIR")
    done

    if [ "$DIR" = "/" ]; then
      echo "No lakefile found — skipping Lean check"
      exit 0
    fi

    LEAN_PROJECT="$DIR"

    # Source elan so we have lean/lake in PATH
    export PATH="$HOME/.elan/bin:$PATH"

    cd "$LEAN_PROJECT"

    # Fast path: compile only the changed .lean files via `lake env lean`
    # This sets LEAN_PATH from the lakefile but only type-checks one file (~2-3s)
    # instead of rebuilding the entire project (~2700+ jobs).
    BUILD_FAIL=0
    for f in $CP_CHANGED_FILES; do
      ABS_FILE="$CP_PROJECT_ROOT/$f"
      echo "Checking $f ..."
      OUTPUT=$(lake env lean "$ABS_FILE" 2>&1) && EXIT=0 || EXIT=$?
      echo "$OUTPUT"
      if [ $EXIT -ne 0 ]; then
        echo ""
        echo "FAIL: $f did not type-check (exit $EXIT)"
        BUILD_FAIL=1
      elif echo "$OUTPUT" | grep -q "declaration uses.*sorry"; then
        echo ""
        echo "FAIL: $f contains sorry (unfinished proof)"
        BUILD_FAIL=1
      else
        echo "OK"
      fi
    done

    if [ $BUILD_FAIL -ne 0 ]; then
      exit 1
    fi

    # Belt-and-suspenders: scan source for sorry keyword
    SORRY_COUNT=0
    for f in $CP_CHANGED_FILES; do
      if grep -v '^\s*--' "$CP_PROJECT_ROOT/$f" 2>/dev/null | grep -q '\bsorry\b'; then
        echo "WARNING: '$f' contains 'sorry' — unfinished proof!"
        SORRY_COUNT=$((SORRY_COUNT + 1))
      fi
    done

    if [ $SORRY_COUNT -gt 0 ]; then
      echo ""
      echo "FAIL: $SORRY_COUNT file(s) contain unfinished proofs (sorry)"
      exit 1
    fi
  last_edited_ms: 0

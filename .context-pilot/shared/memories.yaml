1552560f9d4055af:
  tl_dr: 'Datalab OCR API: POST /api/v1/convert (multipart, X-Api-Key). Poll GET /convert/{id}. Returns markdown. Old /marker and /ocr endpoints deprecated.'
  contents: |-
    ## Endpoint Details
    - **Submit**: POST https://www.datalab.to/api/v1/convert
      - Content-Type: multipart/form-data
      - Auth: X-Api-Key header
      - Params: mode (fast/balanced/accurate), output_format (markdown/html/json/chunks), max_pages, page_range, paginate, disable_image_extraction, disable_image_captions
    - **Poll**: GET https://www.datalab.to/api/v1/convert/{request_id}
      - Returns: status, markdown, html, json, chunks fields
      - Wait until status='complete'
    - Old /api/v1/ocr and /api/v1/marker are DEPRECATED — use /convert
    - reqwest needs `multipart` feature for file upload
    - OCR extensions: pdf, png, jpg, jpeg, tiff, bmp, webp, heic, gif
    - **For markdown mode**: output_format='markdown'
    - **For text boxes mode**: output_format='json' — returns blocks with bounding boxes and block types
  importance: high
  labels:
  - datalab
  - api
  - ocr
  - phase9
  last_edited_ms: 0

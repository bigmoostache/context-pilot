83d3f9f01cc82a78:
  tl_dr: 'Orchestration backend, branch ''demaquetting''. 20 phases X768-X787. Phases 1-9 done & green; GAP1/2/3 tested; M0 crash-replay harness green. Next: Phase 10 (X777) bridge boot.'
  contents: |-
    ## Orchestration Backend Design — v6 (branch maquette)

    v5 = code-grounded three-tier durability. v6 = honesty pass answering a senior-dev review (thread T35). Keystone unchanged:
    - ① **Oplog** (bridge-owned `cp-mod-bridge`): append-only, durable, never coalesced. Authoritative for command effects, rev, seen-marks, phase, lifecycle, cost + the immutable content-addressed body store.
    - ② **State cache**: existing UNTOUCHED `PersistenceWriter` (writer.rs) — async/debounced/coalescing. Mutable `messages/{uid}.yaml`.
    - ③ **Stream**: lossy UDS live tokens + hints.

    ### v6 corrections (the three real findings)
    1. **Inertness honesty (§11.1, I2, V11):** 'behaviorally inert / exactly as today' was overclaimed. Logic identical bridge on/off; TIMING is not. Bridge-ON adds per-event oplog durability latency — moved OFF the hot path via a dedicated oplog thread + group commit, but non-zero. 'Exactly as today' holds only bridge-OFF. V11 measures ON-vs-OFF latency vs the agent's turn-cadence budget.
    2. **fsync model (I2, B7):** per-append `fsync(file)+fsync(dir)` was overkill → `fdatasync` per commit-group + `fsync(dir)` only on segment creation, on the oplog thread.
    3. **Body-storage contradiction RESOLVED (§3.1, I3/I5, V12):** v5 called message bodies BOTH the mutable tier-② cache AND immutable content-addressed — impossible for the same file. v6 splits into two physical stores: tier-② `messages/{uid}.yaml` (mutable, writer-owned, agent self-reload) vs the bridge-owned immutable content-addressed body store (small bodies inlined in the oplog entry = zero double-write; large bodies spill to `oplog/bodies/{hash}` = the named double-write). writer.rs still untouched (bridge adds a disjoint write path). I1 intact: I1 = single-PROCESS exclusion (flock), and two threads in one process writing disjoint paths (messages/ vs oplog/) is permitted — I1 restated to say so.

    Also: Open-Q1 LOCKED (framed records + per-record CRC, since V1 torn-tail depends on it). §20 register banner: every ✅ = 'designed, test-pending', §25 is the real status (v4 was fully ✅ and wrong). First code = isolated oplog append+crash-replay harness passing V1/V2/V10 against kill -9 + simulated deadman re-exec, before more doc.

    Companion: architecture-adversarial-analysis.md, roadmap.md (P0-P11). NOT implemented (discussion).

    ## Context Pilot Frontend Maquette (ui/, unchanged)
    Vite+React19+TS+Tailwind v4+shadcn(base-ui). Branch 'maquette'. Mock only. ViewMode=fleet|threads|cockpit|finder. Build: cd ui && pnpm exec tsc -b.

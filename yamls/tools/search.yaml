# Search tool — Meilisearch full-text search across project files and logs.
#
# Files are automatically indexed in the background using tree-sitter AST
# chunking (semantic: functions, structs, classes) with a character-based
# fallback for unsupported languages. Logs are indexed with tags, importance,
# and full-text content.
#
# Results appear in a dynamic search panel (YAML-formatted, like brave_search).
# The tool result is a pointer to the panel — full content lives in the panel context.

tools:
  search:
    description: |
      Search the project codebase and/or logs. Files are automatically indexed
      in the background using tree-sitter AST chunking (semantic: functions,
      structs, classes) with a character-based fallback for unsupported languages.
      Logs are indexed with tags, importance, and full-text content.

      Results appear in a dynamic search panel (YAML-formatted, like brave_search).
      The tool result only points to the panel — full content is in the panel context.

    parameters:
      query: "Search query. Supports natural language and exact phrases."
      scope: "Where to search: 'all' (both files and logs), 'project' (files only), 'logs' (logs only). Default 'all'."
      path_prefix: "Filter files by path prefix (e.g., 'src/app/'). Project scope only."
      extension: "Filter files by extension (e.g., 'rs', 'py'). Project scope only."
      sort: "Sort order: 'relevance' (default), 'date_asc', 'date_desc'. 'date_*' sorts by timestamp (logs) or last_modified (files)."
      from_date: "ISO 8601 date. Only results after this date."
      to_date: "ISO 8601 date. Only results before this date."
      limit: "Max results per scope (1-50, default 20)."
      semantic_ratio: "Hybrid search ratio (0.0-1.0). 0.0 = pure keyword (default when omitted), 0.5 = balanced hybrid, 1.0 = pure semantic. Use ~0.5 for conceptual queries ('authentication logic', 'error handling') and omit for exact matches ('fn main', 'TODO')."
      hide_contents: "When true, omits file/log contents from results and returns compact metadata (paths, line ranges, chunk types, relevance scores) directly in the tool result instead of creating a panel. Useful for quickly locating files or surveying matches without flooding context with code snippets. Defaults to false."

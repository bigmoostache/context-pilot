name: Build & Release

# ── ONE code path for every release. ────────────────────────────────────────
# Both triggers run the EXACT same jobs (web → build matrix → release):
#   • push to master   → auto-release tagged  v<version>-<short_sha>  (make_latest)
#   • push of a v* tag  → release tagged with that tag
# There is no separate "build" workflow — this file is the whole pipeline.
#
# Every architecture tarball is a COMPLETE bundle, laid out FLAT at the root:
#   cpilot              (the agent TUI)
#   cp-console-server
#   cp-orchestrator
#   web/                (the vite-built SPA, shared across all arches)
#   meilisearch         (ONLY when meilisearch ships an upstream build for the
#                        arch — i.e. every target except aarch64-musl)
#
# Asset names stay `cpilot-<arch>.tar.gz`: the in-app updater
# (crates/cp-orchestrator/src/services/releases) matches assets by
# name.contains(<arch>) && ends_with(".tar.gz") against a fixed KNOWN_ARCHS,
# so renaming would break self-update.

on:
  push:
    branches: ["master"]
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.95.0"
  # Must match the version the search module downloads at runtime
  # (crates/cp-mod-search/src/meili/download.rs :: MEILISEARCH_VERSION).
  MEILI_VERSION: "v1.13.3"

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # The SPA is architecture-independent — build it ONCE and share the dist to
  # every platform bundle via an artifact.
  web:
    name: Build SPA (shared)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      # Relative same-origin API URLs so the SPA talks to the orchestrator that
      # serves it (one binary, one port).
      - name: Build SPA (relative same-origin)
        run: pnpm run build
        working-directory: web
        env:
          VITE_API_URL: ""

      - name: Upload SPA dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist
          retention-days: 5

  build:
    name: ${{ matrix.artifact }}
    needs: web
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: cpilot-linux-x86_64
            meili: linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: cpilot-linux-aarch64
            cross: true
            meili: linux-aarch64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact: cpilot-linux-aarch64-musl
            cross: true
            # No upstream meilisearch build for musl → bundle omits it.
            meili: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: cpilot-macos-x86_64
            meili: macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: cpilot-macos-aarch64
            meili: macos-apple-silicon

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust ${{ env.RUST_VERSION }}
        run: |
          rustup toolchain install ${{ env.RUST_VERSION }} --profile minimal
          rustup default ${{ env.RUST_VERSION }}
          rustup target add ${{ matrix.target }}

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        uses: taiki-e/install-action@cross

      # Three binaries per target: agent (tui) + console server + orchestrator.
      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: |
          cargo build --release --target ${{ matrix.target }} --bin tui
          cargo build --release --target ${{ matrix.target }} -p cp-console-server
          cargo build --release --target ${{ matrix.target }} -p cp-orchestrator

      - name: Build (cross)
        if: ${{ matrix.cross }}
        run: |
          cross build --release --target ${{ matrix.target }} --bin tui
          cross build --release --target ${{ matrix.target }} -p cp-console-server
          cross build --release --target ${{ matrix.target }} -p cp-orchestrator

      - name: Download SPA dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web-dist

      # Flat bundle layout — everything at the tarball root, web/ as a subdir.
      - name: Stage bundle
        run: |
          mkdir -p staging/web
          cp target/${{ matrix.target }}/release/tui staging/cpilot
          cp target/${{ matrix.target }}/release/cp-console-server staging/cp-console-server
          cp target/${{ matrix.target }}/release/cp-orchestrator staging/cp-orchestrator
          chmod 755 staging/cpilot staging/cp-console-server staging/cp-orchestrator
          cp -r web-dist/. staging/web/

      # Meilisearch is a prebuilt raw binary (not a tarball) fetched from the
      # meilisearch GitHub releases — same source + version the app uses at
      # runtime. Skipped for arches with no upstream build (aarch64-musl).
      - name: Bundle meilisearch (if available for arch)
        if: ${{ matrix.meili != '' }}
        run: |
          curl -fSL -o staging/meilisearch \
            "https://github.com/meilisearch/meilisearch/releases/download/${MEILI_VERSION}/meilisearch-${{ matrix.meili }}"
          chmod 755 staging/meilisearch

      - name: Package tarball
        run: tar -czf ${{ matrix.artifact }}.tar.gz -C staging .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
          retention-days: 30

  frontend:
    name: Build web frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile
        working-directory: web

      # Relative same-origin API URLs so the SPA talks to the orchestrator
      # that serves it (one binary, one port).
      - name: Build SPA (relative same-origin)
        run: pnpm run build
        working-directory: web
        env:
          VITE_API_URL: ""

      - name: Package web dist
        run: tar -czf web-dist.tar.gz -C web/dist .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web-dist.tar.gz
          retention-days: 5

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Tag comes from the pushed ref on a tag event; otherwise it's derived
      # from the workspace version + the commit short-sha (auto-release path).
      - name: Compute release tag
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
            short_sha=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "tag=v${version}-${short_sha}" >> "$GITHUB_OUTPUT"
            echo "name=v${version} (${short_sha})" >> "$GITHUB_OUTPUT"
          fi

      # Only the platform tarballs — the shared web-dist artifact is excluded.
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: cpilot-*

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
          make_latest: true

  # ── Signed update manifest (update-policy §5.3–§5.5) ────────────────────
  # Only a REAL `v*` tag push promotes the fleet: it publishes `stable.json` +
  # a detached minisign signature on the `channels` branch. Auto-releases from
  # master pushes (v<version>-<sha>) build + release but never touch the
  # channel — tagging IS the fleet release act (update-policy v3 decision 2).
  manifest:
    name: Publish signed stable manifest
    needs: release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.ref_name }}
      REPO: ${{ github.repository }}
      # Oldest running version this release can be applied from (update-policy
      # §5.6 anti-rollback floor). Bump deliberately when a migration or
      # protocol break makes direct jumps unsafe.
      MIN_FROM: "v0.1.0"
      # Manifest freshness horizon (§5.6): a manifest older than this is
      # treated as a stale replay by the box.
      EXPIRES_DAYS: "90"
    steps:
      - uses: actions/checkout@v4

      - name: Install minisign
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq minisign jq

      # The manifest pins the sha256 of the ACTUALLY-PUBLISHED release assets,
      # so download them back from the release (not from the build workspace) —
      # what we hash is byte-for-byte what a box will download.
      - name: Download published release assets
        run: |
          mkdir -p assets
          for arch in linux-aarch64 linux-x86_64; do
            curl -fSL --retry 5 --retry-delay 10 -o "assets/cpilot-${arch}.tar.gz" \
              "https://github.com/${REPO}/releases/download/${TAG}/cpilot-${arch}.tar.gz"
          done
          sha256sum assets/*.tar.gz

      - name: Generate stable.json
        run: |
          released_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          expires_at=$(date -u -d "+${EXPIRES_DAYS} days" +%Y-%m-%dT%H:%M:%SZ)
          artifacts='{}'
          for arch in linux-aarch64 linux-x86_64; do
            f="assets/cpilot-${arch}.tar.gz"
            sha=$(sha256sum "$f" | cut -d' ' -f1)
            size=$(stat -c%s "$f")
            url="https://github.com/${REPO}/releases/download/${TAG}/cpilot-${arch}.tar.gz"
            artifacts=$(jq -c --arg a "$arch" --arg u "$url" --arg s "$sha" --argjson z "$size" \
              '. + {($a): {url: $u, sha256: $s, size: $z}}' <<<"$artifacts")
          done
          jq -n \
            --arg version "$TAG" \
            --arg released_at "$released_at" \
            --arg expires_at "$expires_at" \
            --arg min_from "$MIN_FROM" \
            --arg notes_url "https://github.com/${REPO}/releases/tag/${TAG}" \
            --argjson artifacts "$artifacts" \
            '{schema: 1, channel: "stable", version: $version,
              released_at: $released_at, expires_at: $expires_at,
              min_from: $min_from, notes_url: $notes_url,
              artifacts: $artifacts}' > stable.json
          cat stable.json

      # Gate the exact contract the box relies on before signing anything.
      - name: Check manifest contract
        run: |
          jq -e '.schema and .version and .artifacts["linux-aarch64"].sha256 and .artifacts["linux-x86_64"].sha256' stable.json
          test "$(jq -r .version stable.json)" = "$TAG"

      - name: Sign stable.json (minisign)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          umask 077
          printf '%s\n' "$MINISIGN_SECRET_KEY" > minisign.key
          minisign -S -s minisign.key -m stable.json -x stable.json.minisig \
            -t "channel=stable version=${TAG}"
          rm -f minisign.key
          # Verify with the embedded public key — the signature must check out
          # against the exact trust anchor shipped in the orchestrator.
          pubkey=$(grep -o '"RW[A-Za-z0-9+/=]*"' \
            crates/cp-orchestrator/src/services/releases/signing.rs | tr -d '"')
          minisign -Vm stable.json -x stable.json.minisig -P "$pubkey"

      # Idempotent, dedicated commit on the `channels` branch (created orphan
      # on first publish). Re-running the job for the same content is a no-op.
      - name: Push manifest to channels branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code origin channels >/dev/null 2>&1; then
            git fetch origin channels
            git worktree add channels-wt origin/channels
            (cd channels-wt && git checkout -B channels)
          else
            git worktree add --detach channels-wt
            (cd channels-wt && git checkout --orphan channels && git rm -rfq . || true)
          fi
          cp stable.json stable.json.minisig channels-wt/
          cd channels-wt
          git add stable.json stable.json.minisig
          if git diff --cached --quiet; then
            echo "channels already up to date — nothing to push"
          else
            git commit -m "channels: stable → ${TAG}"
            git push origin channels
          fi
